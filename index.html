    <div class="clist" id="clist">${cards.map(cardRow).join("")||'<div class="empty">No cards match these filters.</div>'}</div>`;
  document.getElementById("addBtn").onclick=()=>openEditor(null);
  const qel=document.getElementById("q");
  qel.oninput=()=>{ browseFilter.q=qel.value; const p=qel.selectionStart; renderBrowse(); const n=document.getElementById("q"); n.focus(); n.setSelectionRange(p,p); };
  document.getElementById("fReq").onchange=e=>{browseFilter.req=e.target.value;renderBrowse();};
  document.getElementById("fState").onchange=e=>{browseFilter.state=e.target.value;renderBrowse();};
  bindRows();
}
function cardRow(c){
  const req=reqById(c.requirement_id);
  return `<div class="crow" data-id="${c.id}">
    <div class="q" data-toggle>${esc(c.front)}</div>
    <div class="a">${esc(c.back)}</div>
    <div class="meta">
      <span class="pill req">${esc(req?req.title:c.requirement_id)}</span>
      <span class="tag">${esc(c.topic)}</span>
      <span class="pill diff-${c.difficulty}">${c.difficulty}</span>
      <span class="pill">${c.review.state} · due ${fmtDue(c.review.due)}</span>
      ${c.tags.slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}
      <span class="row-actions">
        <button class="mini" data-edit>Edit</button>
        <button class="mini" data-del>Delete</button>
      </span>
    </div></div>`;
}
function bindRows(){
  document.querySelectorAll(".crow").forEach(row=>{
    const id=row.dataset.id;
    row.querySelector("[data-toggle]").onclick=()=>row.classList.toggle("open");
    row.querySelector("[data-edit]").onclick=()=>openEditor(id);
    row.querySelector("[data-del]").onclick=()=>{
      if(confirm("Delete this card permanently?")){
        state.cards=state.cards.filter(c=>c.id!==id); saveState(); toast("Card deleted"); renderBrowse();
      }
    };
  });
}

/* ---------- Card editor modal ---------- */
function openEditor(id){
  const c = id? state.cards.find(x=>x.id===id) : null;
  const reqOpts=state.requirements.map(r=>`<option value="${r.id}" ${c&&c.requirement_id===r.id?'selected':''}>${r.id} — ${esc(r.title)}</option>`).join("");
  const diffOpts=["easy","medium","hard"].map(d=>`<option value="${d}" ${c&&c.difficulty===d?'selected':''}>${d}</option>`).join("");
  const modal=document.getElementById("modal");
  modal.innerHTML=`
    <h3>${c?"Edit card":"New card"}</h3>
    <div class="field"><label>Question (front)</label><textarea id="eFront">${c?esc(c.front):""}</textarea></div>
    <div class="field"><label>Answer (back)</label><textarea id="eBack" style="min-height:140px">${c?esc(c.back):""}</textarea></div>
    <div class="grid g3">
      <div class="field"><label>Requirement</label><select id="eReq">${reqOpts}</select></div>
      <div class="field"><label>Topic</label><input type="text" id="eTopic" value="${c?esc(c.topic):""}"></div>
      <div class="field"><label>Difficulty</label><select id="eDiff">${diffOpts}</select></div>
    </div>
    <div class="field"><label>Tags (comma-separated)</label><input type="text" id="eTags" value="${c?esc(c.tags.join(', ')):""}"></div>
    <div class="modal-actions">
      <button class="btn" id="eCancel">Cancel</button>
      <button class="cta" id="eSave">${c?"Save changes":"Create card"}</button>
    </div>`;
  showModal();
  document.getElementById("eCancel").onclick=hideModal;
  document.getElementById("eSave").onclick=()=>{
    const front=document.getElementById("eFront").value.trim();
    const back=document.getElementById("eBack").value.trim();
    if(!front||!back){ toast("Both question and answer are required"); return; }
    const data={
      requirement_id:document.getElementById("eReq").value,
      topic:document.getElementById("eTopic").value.trim()||"General",
      difficulty:document.getElementById("eDiff").value,
      tags:document.getElementById("eTags").value.split(",").map(s=>s.trim()).filter(Boolean),
      front, back
    };
    if(c){ Object.assign(c,data); toast("Card updated"); }
    else{
      const nid="U"+Date.now().toString(36);
      state.cards.unshift({ id:nid, ...data, source_reference:"Added by you",
        review:{state:"new",due:Date.now(),interval:0,ease:2.5,reps:0,lapses:0,step:0,lastReviewed:null,prevInterval:0}});
      toast("Card created");
    }
    saveState(); hideModal(); renderBrowse();
  };
}
function showModal(){ document.getElementById("modalBg").classList.add("show"); }
function hideModal(){ document.getElementById("modalBg").classList.remove("show"); }
document.getElementById("modalBg").addEventListener("click",e=>{ if(e.target.id==="modalBg") hideModal(); });

/* ---------- Requirements coverage ---------- */
function renderRequirements(){
  const cov=coverage();
  view.innerHTML=`
    <h1 class="view-title">Requirements</h1>
    <p class="view-sub">From the official syllabus — Post-Quantum Cryptography (Murru, a.y. 2024-2025). Requirements decide <i>what</i> is asked; the notes decide <i>what</i> the answer is.</p>
    <div class="panel pad" style="overflow:auto">
      <table class="cov">
        <thead><tr><th>Requirement</th><th class="num">Cards</th><th class="num">Reviews</th><th class="num">Accuracy</th><th class="num">Mature</th><th>Status</th><th></th></tr></thead>
        <tbody>
        ${cov.map(c=>`<tr>
          <td><b>${esc(c.req.title)}</b><br><span class="hint mono">${c.req.id} · ${esc(c.req.code)}</span></td>
          <td class="num">${c.total}</td>
          <td class="num">${c.reviews}</td>
          <td class="num">${c.acc==null?"—":Math.round(c.acc*100)+"%"}</td>
          <td class="num">${c.mature}</td>
          <td><span class="status st-${c.status}">${c.status.replace('_',' ')}</span></td>
          <td><button class="mini" data-study="${c.req.id}" ${c.total?'':'disabled'}>Study</button></td>
        </tr>
        <tr><td colspan="7" class="hint" style="padding-top:0;border-top:0">${esc(c.req.description)}</td></tr>`).join("")}
        </tbody>
      </table>
    </div>
    <p class="hint" style="margin-top:14px">
      <b>uncovered</b> no cards · <b>in progress</b> few reviews so far ·
      <b>weak</b> accuracy below 60% over ≥5 reviews · <b>good</b> ≥60% ·
      <b>mastered</b> ≥85% accuracy with most cards mature.
    </p>`;
  document.querySelectorAll("[data-study]").forEach(b=>b.onclick=()=>{
    browseFilter={req:b.dataset.study,state:"",q:""}; go("browse");
  });
}

/* ---------- Analytics ---------- */
function renderAnalytics(){
  const days=[]; const now=new Date();
  for(let i=13;i>=0;i--){ const d=new Date(now); d.setDate(now.getDate()-i); const k=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
    days.push({k, label:(d.getMonth()+1)+"/"+d.getDate(), h:state.history[k]||{reviews:0,correct:0}}); }
  const max=Math.max(1,...days.map(d=>d.h.reviews));
  const totalRev=state.log.length;
  const totalCorrect=state.log.filter(l=>l.rating==="good"||l.rating==="easy").length;
  const overallAcc=totalRev?Math.round(100*totalCorrect/totalRev):null;
  const states=["new","learning","review","relearning"].map(s=>({s,n:state.cards.filter(c=>c.review.state===s).length}));
  view.innerHTML=`
    <h1 class="view-title">Analytics</h1>
    <p class="view-sub">Your study activity and deck health.</p>
    <div class="grid g3">
      <div class="stat"><div class="k">Total reviews</div><div class="v">${totalRev}</div></div>
      <div class="stat"><div class="k">Overall accuracy</div><div class="v accent">${overallAcc==null?"—":overallAcc+"<small>%</small>"}</div></div>
      <div class="stat"><div class="k">Mature cards</div><div class="v">${state.cards.filter(isMature).length}</div></div>
    </div>
    <div class="sec-h">Reviews — last 14 days</div>
    <div class="panel pad">
      <div style="display:flex;align-items:flex-end;gap:8px;height:160px">
        ${days.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end">
          <div style="width:100%;background:var(--accent);border-radius:6px 6px 0 0;height:${Math.round(100*d.h.reviews/max)}%;min-height:${d.h.reviews?4:0}px" title="${d.h.reviews} reviews"></div>
          <span class="hint mono" style="font-size:10px">${d.label}</span>
        </div>`).join("")}
      </div>
    </div>
    <div class="sec-h">Cards by state</div>
    <div class="grid g4">${states.map(x=>`<div class="stat"><div class="k">${x.s}</div><div class="v">${x.n}</div></div>`).join("")}</div>`;
}

/* ---------- Settings ---------- */
function renderSettings(){
  view.innerHTML=`
    <h1 class="view-title">Settings</h1>
    <p class="view-sub">Tune your study flow. Everything is stored locally in your browser.</p>
    <div class="panel pad" style="max-width:560px">
      <div class="field"><label>New cards per day</label>
        <input type="number" id="newPerDay" min="0" max="200" value="${state.settings.newPerDay}">
        <p class="hint" style="margin-top:6px">How many brand-new cards to introduce each day. Reviews of seen cards are never capped.</p>
      </div>
      <div class="field"><label>Theme</label>
        <select id="themeSel">
          <option value="light" ${state.settings.theme==='light'?'selected':''}>Light</option>
          <option value="dark" ${state.settings.theme==='dark'?'selected':''}>Dark</option>
        </select>
      </div>
      <div class="modal-actions" style="justify-content:flex-start">
        <button class="cta" id="saveSettings">Save settings</button>
      </div>
    </div>
    <div class="sec-h">Data</div>
    <div class="panel pad" style="max-width:560px">
      <p class="hint" style="margin-top:0">Export a backup of your progress, or reset everything back to the original deck.</p>
      <div class="row" style="margin-top:12px">
        <button class="btn" id="exportBtn">Export backup (.json)</button>
        <button class="btn danger" id="resetBtn">Reset all progress</button>
      </div>
      ${hasLS?'':'<p class="hint" style="color:var(--again);margin-top:14px">⚠ Local storage is unavailable here, so progress will not be saved between sessions. Open the downloaded file directly in your browser for full persistence.</p>'}
    </div>`;
  document.getElementById("saveSettings").onclick=()=>{
    state.settings.newPerDay=Math.max(0,parseInt(document.getElementById("newPerDay").value)||0);
    state.settings.theme=document.getElementById("themeSel").value;
    applyTheme(); saveState(); toast("Settings saved");
  };
  document.getElementById("exportBtn").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="pqc-exam-prep-backup.json"; a.click(); URL.revokeObjectURL(a.href);
  };
  document.getElementById("resetBtn").onclick=()=>{
    if(confirm("Reset everything to the original deck? Your review progress and edits will be lost.")){
      state=initState(); applyTheme(); saveState(); toast("Reset complete"); go("dashboard");
    }
  };
}

/* ---------- theme ---------- */
function applyTheme(){ document.documentElement.setAttribute("data-theme", state.settings.theme||"light"); }
document.getElementById("themeBtn").onclick=()=>{
  state.settings.theme = (state.settings.theme==="dark")?"light":"dark"; applyTheme(); saveState();
};

/* ---------- boot ---------- */
if(state.shuffleSeed==null){ state.shuffleSeed=Math.floor(Math.random()*1e9); saveState(); }
applyTheme(); rollDay(); renderTabs(); render();
</script>
