rs"}, {"id": "C0390", "front": "Why are differences of ciphertexts useful in the multiple transmission attack?", "back": "The message m cancels out when subtracting ciphertexts, leaving information about the difference between the random polynomials.", "requirement_id": "REQ-06", "topic": "Multiple Transmission", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "multiple_transmission"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0391", "front": "How can coefficients of ϕ be leaked in the multiple transmission attack?", "back": "Since the random polynomials are ternary, observing coefficients outside {−1, 0, 1} in differences such as ϕ2 − ϕ1 can reveal some coefficients of the original random polynomial.", "requirement_id": "REQ-06", "topic": "Multiple Transmission", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "multiple_transmission"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0392", "front": "What is the intuition behind lattice-based attacks on NTRU?", "back": "The secret polynomials f and g correspond to a short vector in a lattice constructed from the public key h. An attacker tries to recover this short vector.", "requirement_id": "REQ-06", "topic": "Lattice Attack", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "lattice_attack"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0393", "front": "What short vector is targeted in the NTRU lattice attack?", "back": "The vector (αf, g), where α is a convenient scaling factor, is a short vector in a lattice constructed from the public key.", "requirement_id": "REQ-06", "topic": "Lattice Attack", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "lattice_attack"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0394", "front": "How is the NTRU lattice constructed at a high level?", "back": "It is a lattice of rank 2N whose basis is built using the public key coefficients h_i, the modulus q and a scaling factor α.", "requirement_id": "REQ-06", "topic": "Lattice Attack", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "lattice_attack"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0395", "front": "Why is NTRU connected to lattice problems?", "back": "The private polynomials correspond to short vectors in a structured lattice, and recovering them from the public key can be formulated as a lattice problem.", "requirement_id": "REQ-06", "topic": "Lattice Attack", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security", "lattice_attack"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0396", "front": "What is the main security requirement for NTRU parameter selection?", "back": "Parameters must make brute-force, multiple-transmission and lattice-based attacks infeasible while also ensuring decryption correctness.", "requirement_id": "REQ-06", "topic": "Security", "difficulty": "hard", "tags": ["lattice_based", "ntru", "security"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0397", "front": "What is the main performance feature of NTRU?", "back": "NTRU can have relatively compact keys and ciphertexts compared to some other post-quantum schemes, because it works with structured polynomial rings.", "requirement_id": "REQ-06", "topic": "Performance", "difficulty": "easy", "tags": ["lattice_based", "ntru", "performance"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0403", "front": "What is Falcon?", "back": "Falcon is a lattice-based digital signature scheme based on NTRU lattices and the GPV framework.", "requirement_id": "REQ-06", "topic": "Falcon", "difficulty": "easy", "tags": ["lattice_based", "falcon", "definition"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0404", "front": "What type of cryptographic primitive is Falcon?", "back": "Falcon is a digital signature scheme.", "requirement_id": "REQ-06", "topic": "Falcon", "difficulty": "medium", "tags": ["lattice_based", "falcon", "definition"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0405", "front": "What lattice structure does Falcon exploit?", "back": "Falcon exploits the NTRU lattice.", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "medium", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0407", "front": "What are N-th roots of unity?", "back": "The N-th roots of unity are the roots of the polynomial X^N − 1. They are complex numbers z_k = e^{2kπi/N}, for k = 0, 1, ..., N − 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "medium", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0408", "front": "What is z_k in the context of N-th roots of unity?", "back": "z_k = e^{2kπi/N} = cos(2kπ/N) + i sin(2kπ/N), for k = 0, 1, ..., N − 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0409", "front": "Why is z_k an N-th root of unity?", "back": "Because z_k^N = e^{2kπi} = 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "hard", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0410", "front": "What is M_N?", "back": "M_N is the set of all N-th roots of unity: M_N = {z_0, z_1, ..., z_{N−1}}.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0411", "front": "What algebraic structure does M_N form?", "back": "M_N forms a cyclic group of order N.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "medium", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0412", "front": "What are primitive N-th roots of unity?", "back": "Primitive N-th roots of unity are the generators of the cyclic group M_N.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "medium", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0413", "front": "When is z_k a primitive N-th root of unity?", "back": "z_k is a primitive N-th root of unity if and only if gcd(k, N) = 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0414", "front": "How many primitive N-th roots of unity exist?", "back": "There are φ(N) primitive N-th roots of unity, where φ is Euler’s totient function.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "medium", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0415", "front": "What is the N-th cyclotomic polynomial?", "back": "The N-th cyclotomic polynomial Ψ_N(x) is the monic polynomial whose roots are exactly the primitive N-th roots of unity: Ψ_N(x) = ∏*{gcd(k,N)=1}(x − z_k).", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0416", "front": "What is the degree of Ψ_N(x)?", "back": "The degree of Ψ_N(x) is φ(N).", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0417", "front": "What is the factorization of x^N − 1 using cyclotomic polynomials?", "back": "x^N − 1 = ∏*{d|N} Ψ_d(x).", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0418", "front": "What is Ψ_1(x)?", "back": "Ψ_1(x) = x − 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0419", "front": "What is Ψ_2(x)?", "back": "Ψ_2(x) = x + 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0420", "front": "What is Ψ_3(x)?", "back": "Ψ_3(x) = x^2 + x + 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0421", "front": "What is Ψ_4(x)?", "back": "Ψ_4(x) = x^2 + 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0422", "front": "What is Ψ_8(x)?", "back": "Ψ_8(x) = x^4 + 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0423", "front": "What is Ψ_{2^k}(x)?", "back": "For N = 2^k, the cyclotomic polynomial is Ψ_{2^k}(x) = x^{2^{k−1}} + 1.", "requirement_id": "REQ-06", "topic": "Cyclotomic", "difficulty": "easy", "tags": ["lattice_based", "falcon", "cyclotomic"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0424", "front": "What is the GPV framework?", "back": "The Gentry-Peikert-Vaikuntanathan framework is a framework for constructing secure lattice-based signature schemes.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0425", "front": "What is the public key in the GPV framework?", "back": "The public key contains a full-rank matrix A ∈ Z_q^{n×m}, with m > n, generating a q-ary lattice Λ.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0426", "front": "What is the private key in the GPV framework?", "back": "The private key contains a matrix B ∈ Z_q^{m×m} generating the orthogonal lattice Λ_q^⊥.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0427", "front": "What is Λ_q^⊥ in the GPV framework?", "back": "Λ_q^⊥ is the lattice orthogonal to Λ, meaning that for x ∈ Λ and y ∈ Λ_q^⊥, we have \u003cx, y> ≡ 0 mod q.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0428", "front": "What does it mean that A and B are orthogonal in GPV?", "back": "It means that the rows of A and B are pairwise orthogonal, equivalently BA^T = 0 mod q.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0429", "front": "What is a GPV signature?", "back": "A signature of a message m is a short vector s ∈ Z^m such that sA^T = H(m), where H is a hash function.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "easy", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0430", "front": "How is a GPV signature verified?", "back": "Verification checks that sA^T = H(m) and that s is short enough, i.e. ||s|| ≤ β for some parameter β.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "medium", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0431", "front": "Why is GPV verification straightforward?", "back": "Because the verifier only needs to check the public equation sA^T = H(m) and the norm bound on s.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "hard", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0432", "front": "Why is GPV signing difficult without the private key?", "back": "Signing requires finding a short vector s satisfying sA^T = H(m), which is hard without a good private basis of the orthogonal lattice.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "hard", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0433", "front": "How does the GPV private basis help signing?", "back": "The private basis B is used to find a lattice vector v ∈ Λ_q^⊥ close to a vector c_0 satisfying c_0A^T = H(m). Then s = c_0 − v is short and valid.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "medium", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0434", "front": "Why is s = c_0 − v a valid GPV signature?", "back": "Because sA^T = c_0A^T − vA^T = H(m) − 0 = H(m), and s is short if v is close to c_0.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "hard", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0435", "front": "What makes B a good private basis in GPV?", "back": "B is good if its vectors are short and close to orthogonal, because this helps find close lattice vectors efficiently.", "requirement_id": "REQ-06", "topic": "Gpv", "difficulty": "medium", "tags": ["lattice_based", "falcon", "gpv"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0436", "front": "What polynomial modulus is used in Falcon’s NTRU lattice?", "back": "Falcon uses ϕ = x^n + 1, where n = 2^k.", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "medium", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0437", "front": "What are the NTRU secrets in Falcon?", "back": "The NTRU secrets are four polynomials f, g, F, G ∈ Z[X]/(ϕ).", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "medium", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0438", "front": "What is the NTRU equation in Falcon?", "back": "The NTRU equation is fG − gF = q mod ϕ.", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "easy", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0439", "front": "How is the Falcon public key h defined?", "back": "If f is invertible modulo q, the public key is h = g · f^{-1} mod q.", "requirement_id": "REQ-06", "topic": "Public Key", "difficulty": "medium", "tags": ["lattice_based", "falcon", "public_key"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0440", "front": "What is the Falcon private key?", "back": "The Falcon private key is the tuple (f, g, F, G), satisfying the NTRU equation fG − gF = q mod ϕ.", "requirement_id": "REQ-06", "topic": "Private Key", "difficulty": "easy", "tags": ["lattice_based", "falcon", "private_key", "recap", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0441", "front": "What is the NTRU assumption in Falcon?", "back": "Given h = g · f^{-1} mod q, it is hard to find small polynomials f′, g′ such that h = g′ · (f′)^{-1} mod q.", "requirement_id": "REQ-06", "topic": "Security", "difficulty": "hard", "tags": ["lattice_based", "falcon", "security"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0442", "front": "Why does h look pseudorandom in Falcon?", "back": "If f and g are generated with enough entropy, then h = g · f^{-1} mod q looks pseudorandom.", "requirement_id": "REQ-06", "topic": "Security", "difficulty": "hard", "tags": ["lattice_based", "falcon", "security"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0443", "front": "Which two matrices generate the same NTRU lattice in Falcon?", "back": "The matrices [[1, h], [0, q]] and [[f, g], [F, G]] generate the same lattice.", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "medium", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0444", "front": "What is the difference between the public and secret NTRU bases in Falcon?", "back": "The public basis contains large polynomials h and q, while the secret basis contains small polynomials f, g, F and G.", "requirement_id": "REQ-06", "topic": "Ntru Lattice", "difficulty": "easy", "tags": ["lattice_based", "falcon", "ntru_lattice"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0445", "front": "How is GPV instantiated in Falcon?", "back": "Falcon uses the public basis A = [1 | h*] and the secret basis B = [[g, −f], [G, −F]], where h* is the coefficient vector of h.", "requirement_id": "REQ-06", "topic": "Gpv Instantiation", "difficulty": "medium", "tags": ["lattice_based", "falcon", "gpv_instantiation"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0446", "front": "What is h* in Falcon?", "back": "h* is the vector of coefficients of h. If h = h_0 + h_1x + ... + h_{n−1}x^{n−1}, then h* = (h_0, h_1, ..., h_{n−1}).", "requirement_id": "REQ-06", "topic": "Notation", "difficulty": "easy", "tags": ["lattice_based", "falcon", "notation"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0447", "front": "What is the secret basis B in Falcon?", "back": "B = [[g, −f], [G, −F]].", "requirement_id": "REQ-06", "topic": "Secret Basis", "difficulty": "easy", "tags": ["lattice_based", "falcon", "secret_basis"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0448", "front": "Why are A and B orthogonal in Falcon?", "back": "Because h ≡ g f^{-1} mod q implies fh ≡ g mod q, and the NTRU equation fG − gF ≡ 0 mod q implies G ≡ Fh mod q. Therefore BA^T = 0 mod q.", "requirement_id": "REQ-06", "topic": "Orthogonality", "difficulty": "hard", "tags": ["lattice_based", "falcon", "orthogonality"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0449", "front": "What form does a Falcon signature have?", "back": "A Falcon signature is composed of two polynomials s_1 and s_2 such that s_1 + s_2h = H(m|r), where r is a random salt.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "medium", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0450", "front": "Why is it enough to store only s_2 and r in a Falcon signature?", "back": "Because s_1 is completely determined by m, r and s_2 through the equation s_1 + s_2h = H(m|r).", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "hard", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0451", "front": "What is Fast Fourier Sampling used for in Falcon?", "back": "Fast Fourier Sampling is used to efficiently sample short signatures using FFT representations of polynomials.", "requirement_id": "REQ-06", "topic": "Fast Fourier Sampling", "difficulty": "easy", "tags": ["lattice_based", "falcon", "fast_fourier_sampling"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0452", "front": "What is the main idea of using FFT in Falcon?", "back": "Instead of representing a polynomial by its coefficients, Falcon can represent it by its evaluations at roots of unity, enabling faster operations.", "requirement_id": "REQ-06", "topic": "Fft", "difficulty": "easy", "tags": ["lattice_based", "falcon", "fft"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0453", "front": "What is the evaluation representation of a polynomial?", "back": "A polynomial a(x) is represented by the vector of its evaluations at roots of unity, such as (a(z_0), a(z_1), ..., a(z_{n−1})).", "requirement_id": "REQ-06", "topic": "Fft", "difficulty": "easy", "tags": ["lattice_based", "falcon", "fft"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0454", "front": "Why is Fast Fourier Sampling useful in Falcon?", "back": "It speeds up the sampling of short vectors needed for signatures by exploiting the recursive structure of the FFT representation.", "requirement_id": "REQ-06", "topic": "Fast Fourier Sampling", "difficulty": "hard", "tags": ["lattice_based", "falcon", "fast_fourier_sampling"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0455", "front": "What parameters does Falcon fix?", "back": "Falcon fixes q and n, where n = 2^k, and uses ϕ = x^n + 1 and R = Z[X]/(ϕ).", "requirement_id": "REQ-06", "topic": "Parameters", "difficulty": "medium", "tags": ["lattice_based", "falcon", "parameters"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0456", "front": "What is the first step of Falcon key generation?", "back": "Sample f, g ∈ R such that ||f|| and ||g|| are smaller than approximately 1.17√q.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "easy", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0457", "front": "What is computed after sampling f and g in Falcon key generation?", "back": "Compute F and G ∈ R such that fG − gF = q, which is the NTRU equation.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "easy", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0458", "front": "How is the secret basis B constructed in Falcon key generation?", "back": "B is constructed as [[g, −f], [G, −F]], a good basis of the lattice Λ_q^⊥.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "medium", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0459", "front": "What is B̂ in Falcon?", "back": "B̂ is obtained by applying the FFT to each element of the secret basis B.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "easy", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0460", "front": "How is h computed in Falcon key generation?", "back": "h = g · f^{-1} mod q.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "medium", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0461", "front": "What are the Falcon public and secret keys?", "back": "The public key is pk = h, while the secret key is sk = (f, g, F, G).", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "medium", "tags": ["lattice_based", "falcon", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0462", "front": "What is the split operator in Falcon?", "back": "The split operator decomposes a polynomial A(x) into two polynomials A_0(x) and A_1(x), where A_0 contains even-degree coefficients and A_1 contains odd-degree coefficients.", "requirement_id": "REQ-06", "topic": "Split Merge", "difficulty": "easy", "tags": ["lattice_based", "falcon", "split_merge"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0463", "front": "What is the merge operator in Falcon?", "back": "The merge operator reconstructs A(x) from A_0 and A_1 as A(x) = A_0(x^2) + xA_1(x^2).", "requirement_id": "REQ-06", "topic": "Split Merge", "difficulty": "easy", "tags": ["lattice_based", "falcon", "split_merge"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0464", "front": "Why are split and merge useful in Falcon?", "back": "They allow Falcon to reduce polynomial problems recursively, eventually reducing them to operations over integers.", "requirement_id": "REQ-06", "topic": "Split Merge", "difficulty": "hard", "tags": ["lattice_based", "falcon", "split_merge"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0465", "front": "What is the first step of Falcon signature generation?", "back": "Compute H(r | m) = c, where c ∈ R and r is a random salt.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "easy", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0466", "front": "Why is a random salt r used in Falcon signatures?", "back": "The random salt randomizes the hash input and contributes to making signatures non-deterministic.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "hard", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0467", "front": "What is t in Falcon signature generation?", "back": "t = (c, 0)B^{-1}. It represents the target point used to find a close lattice vector.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "easy", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0468", "front": "What is the main computational challenge in Falcon signing?", "back": "The main challenge is finding a lattice vector z generated by B that is close to the target t.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "easy", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0469", "front": "How does Falcon solve the main signing challenge?", "back": "Falcon uses the recursive tree structure of B̂ together with FFT representations and Gaussian sampling to efficiently find a close lattice vector.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "medium", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0470", "front": "What is Gaussian sampling used for in Falcon?", "back": "Gaussian sampling is used to randomize signatures and prevent leakage of information about the private basis.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "easy", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0471", "front": "How is the signature vector s defined in Falcon?", "back": "s = (s_1, s_2) = (t − z)B̂, where z is a lattice vector close to t and B̂ is the FFT representation of B.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "medium", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0472", "front": "Why is the Falcon signature short?", "back": "The vector z is chosen close to t, so t − z is small, and therefore the resulting signature vector s is short.", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "hard", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0473", "front": "Why does the Falcon signature satisfy the verification equation?", "back": "Because the rows of B are orthogonal to A*, so the lattice component vanishes and we obtain sA* = c = H(m|r).", "requirement_id": "REQ-06", "topic": "Correctness", "difficulty": "hard", "tags": ["lattice_based", "falcon", "correctness"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0474", "front": "What does Falcon return as the signature?", "back": "Falcon returns the signature (s_2, r).", "requirement_id": "REQ-06", "topic": "Signature", "difficulty": "easy", "tags": ["lattice_based", "falcon", "signature"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0475", "front": "What is checked first during Falcon verification?", "back": "The verifier checks that ||s_2|| ≤ β for some parameter β.", "requirement_id": "REQ-06", "topic": "Verification", "difficulty": "easy", "tags": ["lattice_based", "falcon", "verification"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0476", "front": "What equation is checked during Falcon verification?", "back": "The verifier checks that s_1 + s_2h = c mod q, where c = H(m|r).", "requirement_id": "REQ-06", "topic": "Verification", "difficulty": "medium", "tags": ["lattice_based", "falcon", "verification"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0477", "front": "What does Falcon verification return?", "back": "It returns 1 if s_1 + s_2h = H(m|r) mod q and the norm bound is satisfied; otherwise it returns 0.", "requirement_id": "REQ-06", "topic": "Verification", "difficulty": "easy", "tags": ["lattice_based", "falcon", "verification"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0478", "front": "Why is Falcon considered efficient in signature size?", "back": "Falcon signatures are short because they are sampled as short lattice vectors and most Gaussian-sampled coefficients are concentrated around zero.", "requirement_id": "REQ-06", "topic": "Performance", "difficulty": "hard", "tags": ["lattice_based", "falcon", "performance"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0479", "front": "Why can Falcon compress signatures efficiently?", "back": "Because sampled coefficients are usually small, so Falcon can encode small coefficients rather than arbitrary elements modulo q.", "requirement_id": "REQ-06", "topic": "Compression", "difficulty": "hard", "tags": ["lattice_based", "falcon", "compression"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0480", "front": "What is the Gaussian 99.7% rule mentioned in the Falcon notes?", "back": "For a Gaussian distribution with mean μ and standard deviation σ, approximately 99.7% of the values lie in the interval [μ − 3σ, μ + 3σ].", "requirement_id": "REQ-06", "topic": "Compression", "difficulty": "easy", "tags": ["lattice_based", "falcon", "compression"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0481", "front": "How does Falcon compare with Classic McEliece and HQC?", "back": "Falcon is a signature scheme with compact public keys and signatures, while Classic McEliece and HQC are KEM/PKE schemes and do not provide signatures in the same comparison table.", "requirement_id": "REQ-08", "topic": "Falcon", "difficulty": "medium", "tags": ["comparison", "falcon"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0483", "front": "Why is Falcon attractive among post-quantum signature schemes?", "back": "Falcon is attractive because it provides post-quantum signatures with relatively compact public keys and signatures.", "requirement_id": "REQ-06", "topic": "Performance", "difficulty": "hard", "tags": ["lattice_based", "falcon", "performance"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0484", "front": "What is the main idea behind Falcon in one sentence?", "back": "Falcon uses a secret short basis of an NTRU lattice to sample short signatures that can be verified using a compact public key h.", "requirement_id": "REQ-06", "topic": "Summary", "difficulty": "easy", "tags": ["lattice_based", "falcon", "summary"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0485", "front": "What is multivariate cryptography based on?", "back": "Multivariate cryptography is based on the hardness of solving systems of multivariate polynomial equations of degree at least two.", "requirement_id": "REQ-07", "topic": "Multivariate", "difficulty": "easy", "tags": ["multivariate", "overview"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0486", "front": "What is the Multivariate Polynomial Problem?", "back": "Given m polynomials p1, ..., pm ∈ F_q[x1, ..., xn] of degree d ≥ 2, the Multivariate Polynomial Problem asks to find a solution of the system p1(x1, ..., xn) = 0, ..., pm(x1, ..., xn) = 0.", "requirement_id": "REQ-07", "topic": "Mpp", "difficulty": "easy", "tags": ["multivariate", "mpp", "definition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0487", "front": "What does the Multivariate Polynomial Problem ask intuitively?", "back": "It asks to find values for n unknowns that satisfy a system of m multivariate polynomial equations.", "requirement_id": "REQ-07", "topic": "Intuition", "difficulty": "easy", "tags": ["multivariate", "mpp", "intuition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0488", "front": "What is the MQ problem?", "back": "The MQ problem, or Multivariate Quadratic Problem, is the quadratic case of the Multivariate Polynomial Problem, where the polynomials have degree 2.", "requirement_id": "REQ-07", "topic": "Mq", "difficulty": "easy", "tags": ["multivariate", "mq", "definition", "recap"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0489", "front": "Why is the MQ problem important in multivariate cryptography?", "back": "The MQ problem is important because it is NP-complete and is the most common hard problem used in multivariate cryptography.", "requirement_id": "REQ-07", "topic": "Importance", "difficulty": "hard", "tags": ["multivariate", "mq", "importance"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0490", "front": "Why are quadratic polynomials commonly used in multivariate cryptography?", "back": "Quadratic polynomials are used because the MQ problem is already hard, while using higher-degree polynomials only increases solving complexity polynomially in many settings.", "requirement_id": "REQ-07", "topic": "Intuition", "difficulty": "hard", "tags": ["multivariate", "mq", "intuition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0491", "front": "What is the public polynomial map in multivariate cryptography?", "back": "The public map is P : F_q^n → F_q^m, defined by P(x1, ..., xn) = (p1(x), ..., pm(x)), where p1, ..., pm are multivariate polynomials.", "requirement_id": "REQ-07", "topic": "Public Map", "difficulty": "easy", "tags": ["multivariate", "framework", "public_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0492", "front": "What is the hard problem associated with the public map P?", "back": "Given y ∈ F_q^m, the hard problem is to find a preimage x ∈ F_q^n such that P(x) = y.", "requirement_id": "REQ-07", "topic": "Preimage", "difficulty": "easy", "tags": ["multivariate", "framework", "preimage"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0493", "front": "What is a preimage?", "back": "Let f : A → B be a function and y ∈ B. A preimage of y is an element x ∈ A such that f(x) = y.", "requirement_id": "REQ-07", "topic": "Preimage", "difficulty": "easy", "tags": ["multivariate", "framework", "preimage"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0494", "front": "How can multivariate cryptography be used for encryption?", "back": "In encryption, Alice computes C = P(M), where M is the message and P is the public polynomial map. Bob can recover M because he knows a secret trapdoor that allows him to solve P(x) = C.", "requirement_id": "REQ-07", "topic": "Encryption", "difficulty": "medium", "tags": ["multivariate", "encryption"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0495", "front": "How can multivariate cryptography be used for digital signatures?", "back": "In signatures, the signer hashes the message to H(M) and uses the secret trapdoor to find a vector s such that P(s) = H(M). Verification checks that P(s) = H(M).", "requirement_id": "REQ-07", "topic": "Signatures", "difficulty": "medium", "tags": ["multivariate", "signatures"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0496", "front": "In multivariate signatures, what is the signature?", "back": "The signature is a vector s such that P(s) = H(M), where H(M) is the hash of the message.", "requirement_id": "REQ-07", "topic": "Signatures", "difficulty": "medium", "tags": ["multivariate", "signatures"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0497", "front": "How is a multivariate signature verified?", "back": "The verifier computes H(M) and checks whether P(s) = H(M).", "requirement_id": "REQ-07", "topic": "Verification", "difficulty": "medium", "tags": ["multivariate", "signatures", "verification"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0498", "front": "Why is signing hard without the trapdoor?", "back": "Signing requires finding a preimage of H(M) under the public polynomial map P, which means solving a multivariate polynomial system.", "requirement_id": "REQ-07", "topic": "Security", "difficulty": "hard", "tags": ["multivariate", "signatures", "security"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0499", "front": "Why is a trapdoor needed in multivariate cryptography?", "back": "The trapdoor allows the legitimate user to invert the public-looking polynomial map efficiently, while inversion remains hard for an attacker.", "requirement_id": "REQ-07", "topic": "Trapdoor", "difficulty": "hard", "tags": ["multivariate", "framework", "trapdoor"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0500", "front": "What is the central map in multivariate cryptography?", "back": "The central map F : F_q^n → F_q^m is a secret polynomial map with a special structure that makes it easy to invert for the legitimate user.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0501", "front": "What is the general form of the public map using a central map?", "back": "The public map is obtained by composing the secret central map F with secret affine transformations, typically P = S ∘ F ∘ T.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0502", "front": "What is the purpose of the affine transformations S and T?", "back": "S and T hide the special structure of the central map F, making the public map P look like a generic system of multivariate polynomial equations.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0503", "front": "What are Hidden Field Equations?", "back": "Hidden Field Equations are a multivariate trapdoor where the public system of quadratic polynomials comes from a secret univariate polynomial over a finite field extension.", "requirement_id": "REQ-07", "topic": "Hfe", "difficulty": "medium", "tags": ["multivariate", "hfe"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0504", "front": "What is the Oil and Vinegar trapdoor idea?", "back": "The Oil and Vinegar trapdoor is based on separating variables into oil and vinegar variables so that, after fixing the vinegar variables, the system becomes linear in the oil variables.", "requirement_id": "REQ-07", "topic": "Trapdoor", "difficulty": "easy", "tags": ["multivariate", "ov", "trapdoor"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0505", "front": "What is linearization in the context of MQ systems?", "back": "Linearization replaces nonlinear monomials, such as x_i x_j, with new variables, transforming a quadratic system into a linear system in more variables.", "requirement_id": "REQ-07", "topic": "Linearization", "difficulty": "hard", "tags": ["multivariate", "linearization"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0506", "front": "How many quadratic monomials are there in n variables?", "back": "The number of quadratic monomials in n variables is t = n(n + 1)/2.", "requirement_id": "REQ-07", "topic": "Monomials", "difficulty": "hard", "tags": ["multivariate", "linearization", "monomials"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0507", "front": "More generally, how many monomials of degree d are there in n variables?", "back": "The number of monomials of degree d in n variables is binomial(n + d − 1, d).", "requirement_id": "REQ-07", "topic": "Monomials", "difficulty": "hard", "tags": ["multivariate", "linearization", "monomials"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0508", "front": "After linearization, how many solutions can the linearized system have?", "back": "If the linearized system has t variables and r independent equations over F_q, then it has q^{t−r} solutions.", "requirement_id": "REQ-07", "topic": "Solutions", "difficulty": "hard", "tags": ["multivariate", "linearization", "solutions"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0509", "front": "What are parasitic solutions?", "back": "Parasitic solutions are solutions of the linearized system that are not valid solutions of the original quadratic system.", "requirement_id": "REQ-07", "topic": "Parasitic Solutions", "difficulty": "hard", "tags": ["multivariate", "linearization", "parasitic_solutions"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0510", "front": "Why can linearization create many parasitic solutions?", "back": "Because the new variables introduced for monomials must satisfy algebraic relations with the original variables, but the linearized system does not enforce all these relations.", "requirement_id": "REQ-07", "topic": "Parasitic Solutions", "difficulty": "hard", "tags": ["multivariate", "linearization", "parasitic_solutions"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0511", "front": "What is the main issue with linearization?", "back": "The main issue is that the linearized system may have exponentially many solutions, many of which are parasitic and do not correspond to solutions of the original quadratic system.", "requirement_id": "REQ-07", "topic": "Problem", "difficulty": "hard", "tags": ["multivariate", "linearization", "problem"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0512", "front": "How do solving methods try to reduce parasitic solutions?", "back": "They try to increase the number r of independent equations, i.e. the rank of the linearized system, in order to reduce q^{t−r}.", "requirement_id": "REQ-07", "topic": "Solving", "difficulty": "hard", "tags": ["multivariate", "linearization", "solving"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0513", "front": "What is Oil and Vinegar?", "back": "Oil and Vinegar is a multivariate quadratic signature scheme proposed by Patarin in 1997.", "requirement_id": "REQ-07", "topic": "Ov", "difficulty": "easy", "tags": ["multivariate", "ov", "definition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0514", "front": "What is the main idea of Oil and Vinegar?", "back": "The main idea is to separate the variables into vinegar variables and oil variables, constructing the central map so that there are no products of two oil variables.", "requirement_id": "REQ-07", "topic": "Intuition", "difficulty": "easy", "tags": ["multivariate", "ov", "intuition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0515", "front": "What are the vinegar variables in Oil and Vinegar?", "back": "The vinegar variables are x1, ..., xv.", "requirement_id": "REQ-07", "topic": "Variables", "difficulty": "medium", "tags": ["multivariate", "ov", "variables"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0516", "front": "What are the oil variables in Oil and Vinegar?", "back": "The oil variables are x_{v+1}, ..., x_{v+o}.", "requirement_id": "REQ-07", "topic": "Variables", "difficulty": "medium", "tags": ["multivariate", "ov", "variables"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0517", "front": "How many variables are there in Oil and Vinegar?", "back": "There are v vinegar variables and o oil variables, for a total of n = v + o variables.", "requirement_id": "REQ-07", "topic": "Variables", "difficulty": "medium", "tags": ["multivariate", "ov", "variables"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0518", "front": "What was the original balanced Oil and Vinegar choice?", "back": "The original balanced Oil and Vinegar scheme used o = v, meaning the number of oil variables and vinegar variables was the same.", "requirement_id": "REQ-07", "topic": "Balanced", "difficulty": "medium", "tags": ["multivariate", "ov", "balanced"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0519", "front": "What is the secret central map in Oil and Vinegar?", "back": "The secret central map is F : F_q^{v+o} → F_q^o, formed by o quadratic polynomials in n = v + o variables.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "ov", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0520", "front": "Which terms are allowed in Oil and Vinegar polynomials?", "back": "Oil and Vinegar polynomials may contain linear terms, vinegar-vinegar quadratic terms and vinegar-oil mixed terms.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "medium", "tags": ["multivariate", "ov", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0521", "front": "Which terms are forbidden in Oil and Vinegar polynomials?", "back": "Products of two oil variables are forbidden. There are no oil-oil quadratic terms in the central map.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "medium", "tags": ["multivariate", "ov", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0522", "front": "Why are oil-oil terms forbidden in Oil and Vinegar?", "back": "They are forbidden because, once vinegar variables are fixed, the system must become linear in the oil variables. Oil-oil products would make it quadratic in the oil variables.", "requirement_id": "REQ-07", "topic": "Trapdoor", "difficulty": "hard", "tags": ["multivariate", "ov", "trapdoor"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0523", "front": "Why does fixing vinegar variables make the OV system linear?", "back": "After assigning values to vinegar variables, vinegar-vinegar terms become constants and vinegar-oil terms become linear terms in the oil variables. Since there are no oil-oil terms, the remaining system is linear in the oil variables.", "requirement_id": "REQ-07", "topic": "Trapdoor", "difficulty": "hard", "tags": ["multivariate", "ov", "trapdoor"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0524", "front": "What is the public map in the basic OV construction?", "back": "The public map is P = F ∘ T, where F is the secret central map and T is a secret invertible affine transformation.", "requirement_id": "REQ-07", "topic": "Public Map", "difficulty": "easy", "tags": ["multivariate", "ov", "public_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0525", "front": "Why is only T used in the OV construction described in the notes?", "back": "Only T is used because any linear transformation of OV polynomials is still an OV polynomial, so an additional output transformation S would not add security.", "requirement_id": "REQ-07", "topic": "Public Map", "difficulty": "hard", "tags": ["multivariate", "ov", "public_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0526", "front": "What is the public key in Oil and Vinegar?", "back": "The public key is the composed quadratic polynomial system P = F ∘ T.", "requirement_id": "REQ-07", "topic": "Keygen", "difficulty": "easy", "tags": ["multivariate", "ov", "keygen"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0527", "front": "What is the private key in Oil and Vinegar?", "back": "The private key consists of the secret central map F and the secret invertible affine transformation T.", "requirement_id": "REQ-07", "topic": "Keygen", "difficulty": "easy", "tags": ["multivariate", "ov", "keygen"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0528", "front": "How is Oil and Vinegar key generation performed?", "back": "Choose the coefficients of the OV central polynomials uniformly at random and choose a random invertible affine transformation T. The public key is P = F ∘ T and the private key is (F, T).", "requirement_id": "REQ-07", "topic": "Keygen", "difficulty": "medium", "tags": ["multivariate", "ov", "keygen"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0529", "front": "How is the central map F inverted in Oil and Vinegar?", "back": "To invert F, randomly fix the vinegar variables, then solve the resulting linear system in the oil variables. If the system has no solution or is not full rank, choose new vinegar variables and try again.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "medium", "tags": ["multivariate", "ov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0530", "front": "Why is inverting F efficient for the legitimate signer?", "back": "The legitimate signer knows the oil-vinegar structure. By fixing the vinegar variables, the system becomes a linear system in the oil variables and can be solved efficiently.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "hard", "tags": ["multivariate", "ov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0531", "front": "What happens if the chosen vinegar variables produce an unsolvable system?", "back": "The signer chooses new random vinegar values and repeats the procedure.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "medium", "tags": ["multivariate", "ov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0532", "front": "When does the linear system in the oil variables have a unique solution?", "back": "It has a unique solution when its coefficient matrix has full rank, equivalently when its determinant is non-zero.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "medium", "tags": ["multivariate", "ov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0533", "front": "How is an OV signature generated?", "back": "Compute w = H(d), choose random vinegar values, solve the linear system F(x) = w for the oil variables, then compute z = T^{-1}(x). The signature is z.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "medium", "tags": ["multivariate", "ov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0534", "front": "What is the first step of OV signature generation?", "back": "Compute the hash w = H(d) of the document d.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "easy", "tags": ["multivariate", "ov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0535", "front": "What is the second step of OV signature generation?", "back": "Choose v random values r1, ..., rv ∈ F_q and assign them to the vinegar variables.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "easy", "tags": ["multivariate", "ov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0536", "front": "What is solved during OV signature generation?", "back": "After fixing the vinegar variables, solve the linear system F(x_{v+1}, ..., x_{v+o}) = w for the oil variables.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "easy", "tags": ["multivariate", "ov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0537", "front": "Why is T^{-1} applied in OV signature generation?", "back": "The solution is found in the secret coordinate system of F. Applying T^{-1} maps it back to the public coordinate system.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "hard", "tags": ["multivariate", "ov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0538", "front": "How is an OV signature verified?", "back": "Compute w = H(d), compute w′ = P(z) using the public system and the signature z, and accept if w = w′.", "requirement_id": "REQ-07", "topic": "Verification", "difficulty": "medium", "tags": ["multivariate", "ov", "verification"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0539", "front": "What is the correctness idea of OV signatures?", "back": "The signer finds x such that F(x) = H(d), then outputs z = T^{-1}(x). Since P = F ∘ T, verification gives P(z) = F(T(z)) = F(x) = H(d).", "requirement_id": "REQ-07", "topic": "Correctness", "difficulty": "hard", "tags": ["multivariate", "ov", "correctness"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0540", "front": "What is the security intuition of Oil and Vinegar?", "back": "Without knowing the secret separation into oil and vinegar variables, the public map looks like a generic multivariate quadratic system, whose inversion is assumed hard.", "requirement_id": "REQ-07", "topic": "Security", "difficulty": "hard", "tags": ["multivariate", "ov", "security"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0541", "front": "What is the weakness of balanced Oil and Vinegar?", "back": "Balanced Oil and Vinegar, where o = v, is vulnerable to structural attacks that can recover an equivalent oil-vinegar structure.", "requirement_id": "REQ-07", "topic": "Security", "difficulty": "hard", "tags": ["multivariate", "ov", "security"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0542", "front": "What is the Kipnis attack?", "back": "The Kipnis attack is a structural attack against balanced Oil and Vinegar that aims to recover an equivalent secret structure, allowing the attacker to forge signatures.", "requirement_id": "REQ-07", "topic": "Kipnis Attack", "difficulty": "hard", "tags": ["multivariate", "ov", "kipnis_attack"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0543", "front": "What is the idea behind the Kipnis attack?", "back": "The attacker tries to find a change of variables that reveals an equivalent oil-vinegar structure. Once this structure is found, the public equations become linear in the oil variables after fixing vinegar variables.", "requirement_id": "REQ-07", "topic": "Kipnis Attack", "difficulty": "hard", "tags": ["multivariate", "ov", "kipnis_attack"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0544", "front": "Why does recovering an equivalent OV structure allow forgery?", "back": "Because the attacker can imitate the legitimate signing algorithm: fix vinegar variables, solve the resulting linear system in the oil variables, and obtain valid signatures.", "requirement_id": "REQ-07", "topic": "Kipnis Attack", "difficulty": "hard", "tags": ["multivariate", "ov", "kipnis_attack"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0545", "front": "What is Unbalanced Oil and Vinegar?", "back": "Unbalanced Oil and Vinegar, or UOV, is a variant of Oil and Vinegar where the number of vinegar variables v is greater than the number of oil variables o.", "requirement_id": "REQ-07", "topic": "Uov", "difficulty": "easy", "tags": ["multivariate", "uov", "definition"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0546", "front": "Why was UOV introduced?", "back": "UOV uses more vinegar variables than oil variables to improve security against structural attacks affecting balanced Oil and Vinegar.", "requirement_id": "REQ-07", "topic": "Motivation", "difficulty": "hard", "tags": ["multivariate", "uov", "motivation", "recap", "security"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0547", "front": "What is the key parameter condition in UOV?", "back": "In UOV, the number of vinegar variables is greater than the number of oil variables: v > o.", "requirement_id": "REQ-07", "topic": "Parameters", "difficulty": "easy", "tags": ["multivariate", "uov", "parameters"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0548", "front": "Why does v > o improve security in UOV?", "back": "The unbalance makes the scheme more resistant to structural attacks such as the Kipnis-Shamir attack.", "requirement_id": "REQ-07", "topic": "Security", "difficulty": "hard", "tags": ["multivariate", "uov", "security"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0549", "front": "What is the main advantage of UOV?", "back": "UOV is designed to be efficient for digital signatures, with fast signing and verification and reasonably small signature sizes.", "requirement_id": "REQ-07", "topic": "Performance", "difficulty": "easy", "tags": ["multivariate", "uov", "performance", "recap"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0550", "front": "What is the main drawback of UOV?", "back": "The main drawback of UOV is its large public key size.", "requirement_id": "REQ-07", "topic": "Performance", "difficulty": "easy", "tags": ["multivariate", "uov", "performance", "recap"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0551", "front": "What paradigm is used by UOV signatures?", "back": "UOV uses the hash-and-sign paradigm.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "medium", "tags": ["multivariate", "uov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0552", "front": "How does the hash-and-sign paradigm work in UOV?", "back": "The message is hashed to a target vector t ∈ F_q^m, and the signer uses the secret key to find a preimage s ∈ F_q^n such that P(s) = t.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "medium", "tags": ["multivariate", "uov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0553", "front": "What is the UOV signature?", "back": "The UOV signature is the vector s such that P(s) = H(μ).", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "easy", "tags": ["multivariate", "uov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0554", "front": "How is UOV signature generation performed?", "back": "Compute t = H(μ), find a random preimage u ∈ F_q^n such that F(u) = t using the secret key, compute s = T^{-1}(u), and output σ = s.", "requirement_id": "REQ-07", "topic": "Signature", "difficulty": "medium", "tags": ["multivariate", "uov", "signature"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0555", "front": "How is a UOV signature verified?", "back": "Compute t = H(μ), compute t′ = P(σ) using the public key, and verify that t = t′.", "requirement_id": "REQ-07", "topic": "Verification", "difficulty": "medium", "tags": ["multivariate", "uov", "verification"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0556", "front": "What is the central map of UOV?", "back": "The central map of UOV is a quadratic map F : F_q^n → F_q^m following the oil-vinegar principle: the first v = n − m variables are vinegar variables and the remaining m variables are oil variables.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "uov", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0557", "front": "What is the key structural property of the UOV central map?", "back": "Each polynomial is constructed so that no quadratic term contains the product of two oil variables.", "requirement_id": "REQ-07", "topic": "Central Map", "difficulty": "easy", "tags": ["multivariate", "uov", "central_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0558", "front": "Why does fixing vinegar variables help in UOV?", "back": "Fixing vinegar variables turns the UOV quadratic system into a linear system in the oil variables, which can be solved efficiently by the legitimate signer.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "hard", "tags": ["multivariate", "uov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0559", "front": "How is the public map P defined in UOV?", "back": "The public map is P = F ∘ T, where F is the secret central map and T is an invertible linear transformation hiding the structure of F.", "requirement_id": "REQ-07", "topic": "Public Map", "difficulty": "medium", "tags": ["multivariate", "uov", "public_map"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0560", "front": "Why can the legitimate signer invert P efficiently in UOV?", "back": "The signer knows F and T. Inverting P reduces to finding a preimage under F by fixing vinegar variables and solving a linear system in the oil variables, then applying T^{-1}.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "hard", "tags": ["multivariate", "uov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0561", "front": "What happens if the UOV linear system is not full rank?", "back": "The signer chooses new random vinegar variables and repeats the procedure. Since full rank occurs with high probability, only a polynomial number of attempts is needed.", "requirement_id": "REQ-07", "topic": "Inversion", "difficulty": "medium", "tags": ["multivariate", "uov", "inversion"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0563", "front": "How does UOV relate to the NIST post-quantum signature call?", "back": "UOV is one of the multivariate signature schemes considered in the NIST call for post-quantum digital signatures.", "requirement_id": "REQ-07", "topic": "Nist", "difficulty": "medium", "tags": ["multivariate", "uov", "nist"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0564", "front": "Compare OV and UOV.", "back": "OV originally used a balanced choice o = v and is vulnerable to structural attacks. UOV chooses v > o, improving resistance to attacks while keeping the oil-vinegar signing mechanism.", "requirement_id": "REQ-08", "topic": "Ov Uov", "difficulty": "medium", "tags": ["multivariate", "comparison", "ov_uov"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0565", "front": "Summarize the multivariate signature idea in one sentence.", "back": "A multivariate signature scheme publishes a polynomial map P and uses a secret trapdoor to find a preimage s of H(M), while verification simply checks P(s) = H(M).", "requirement_id": "REQ-07", "topic": "Summary", "difficulty": "medium", "tags": ["multivariate", "summary"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0566", "front": "What is the main goal of post-quantum cryptography?", "back": "The goal of post-quantum cryptography is to design cryptographic schemes that remain secure even against attackers equipped with quantum computers.", "requirement_id": "REQ-08", "topic": "Introduction", "difficulty": "easy", "tags": ["recap", "introduction"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0567", "front": "Why are RSA and ECC vulnerable in the quantum setting?", "back": "RSA and ECC rely on integer factorization and discrete logarithms, which can be solved efficiently by Shor’s algorithm on a sufficiently powerful quantum computer.", "requirement_id": "REQ-08", "topic": "Introduction", "difficulty": "hard", "tags": ["recap", "introduction"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0568", "front": "Which three main hard-problem families are covered in the course?", "back": "The course mainly covers code-based cryptography, lattice-based cryptography and multivariate cryptography.", "requirement_id": "REQ-08", "topic": "Families", "difficulty": "medium", "tags": ["recap", "families"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0569", "front": "What is the hard problem behind code-based cryptography?", "back": "Code-based cryptography relies on the hardness of decoding random linear codes or solving syndrome decoding problems.", "requirement_id": "REQ-04", "topic": "Code Based", "difficulty": "easy", "tags": ["recap", "code_based"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0570", "front": "What is the hard problem behind lattice-based cryptography?", "back": "Lattice-based cryptography relies on hard lattice problems such as SVP, CVP, LWE and Ring-LWE.", "requirement_id": "REQ-06", "topic": "Lattice Based", "difficulty": "easy", "tags": ["recap", "lattice_based"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0571", "front": "What is the hard problem behind multivariate cryptography?", "back": "Multivariate cryptography relies on the hardness of solving systems of multivariate polynomial equations, especially quadratic systems.", "requirement_id": "REQ-07", "topic": "Multivariate", "difficulty": "easy", "tags": ["recap", "multivariate"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0572", "front": "Compare code-based, lattice-based and multivariate cryptography at a high level.", "back": "Code-based cryptography hides a decodable code inside a random-looking code. Lattice-based cryptography hides short vectors or noisy linear relations inside lattice structures. Multivariate cryptography hides an easy-to-invert polynomial map inside a random-looking quadratic system.", "requirement_id": "REQ-08", "topic": "Comparison", "difficulty": "medium", "tags": ["recap", "comparison"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0573", "front": "Which schemes studied are mainly KEM or encryption schemes?", "back": "McEliece, Niederreiter, Classic McEliece KEM, HQC and NTRU are mainly encryption or key-encapsulation schemes.", "requirement_id": "REQ-08", "topic": "Schemes", "difficulty": "medium", "tags": ["recap", "schemes"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0574", "front": "Which schemes studied are digital signature schemes?", "back": "Falcon and UOV are digital signature schemes. Oil and Vinegar is also studied as the basis of multivariate signature schemes.", "requirement_id": "REQ-08", "topic": "Schemes", "difficulty": "medium", "tags": ["recap", "schemes"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0575", "front": "What is a trapdoor in post-quantum cryptography?", "back": "A trapdoor is secret information that makes an otherwise hard inversion problem efficiently solvable for the legitimate user.", "requirement_id": "REQ-08", "topic": "Trapdoor", "difficulty": "easy", "tags": ["recap", "trapdoor"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0576", "front": "What is the trapdoor idea in McEliece?", "back": "The public key looks like a random generator matrix, while the private key reveals a structured Goppa code that can be decoded efficiently.", "requirement_id": "REQ-04", "topic": "Mceliece", "difficulty": "easy", "tags": ["recap", "trapdoor", "mceliece"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0577", "front": "What is the trapdoor idea in Niederreiter?", "back": "The public key is a random-looking parity-check matrix, while the private key reveals a structured Goppa code that allows efficient syndrome decoding.", "requirement_id": "REQ-04", "topic": "Niederreiter", "difficulty": "easy", "tags": ["recap", "trapdoor", "niederreiter"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0578", "front": "What is the trapdoor idea in NTRU?", "back": "The public key h hides small secret polynomials f and g. Knowing f allows the decryptor to transform the ciphertext into a small expression from which the message can be recovered.", "requirement_id": "REQ-06", "topic": "Ntru", "difficulty": "easy", "tags": ["recap", "trapdoor", "ntru"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0579", "front": "What is the trapdoor idea in Falcon?", "back": "The public key gives a hard lattice description, while the private key gives a short and nearly orthogonal NTRU lattice basis that enables efficient sampling of short signatures.", "requirement_id": "REQ-06", "topic": "Falcon", "difficulty": "easy", "tags": ["recap", "trapdoor", "falcon"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0580", "front": "What is the trapdoor idea in Oil and Vinegar/UOV?", "back": "The secret variable separation into vinegar and oil variables makes the central map easy to invert: after fixing vinegar variables, the system becomes linear in the oil variables.", "requirement_id": "REQ-07", "topic": "Uov", "difficulty": "easy", "tags": ["recap", "trapdoor", "uov"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0581", "front": "Compare McEliece and Niederreiter in terms of public keys.", "back": "McEliece uses a public generator matrix G′ = SGP. Niederreiter uses a public parity-check matrix H′ = SHP.", "requirement_id": "REQ-08", "topic": "Mceliece Niederreiter", "difficulty": "medium", "tags": ["recap", "comparison", "mceliece_niederreiter"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0582", "front": "Compare McEliece and Niederreiter in terms of plaintexts.", "back": "In McEliece, the plaintext is an information vector m ∈ F_2^k. In Niederreiter, the plaintext is a low-weight error vector m ∈ F_2^n.", "requirement_id": "REQ-08", "topic": "Mceliece Niederreiter", "difficulty": "medium", "tags": ["recap", "comparison", "mceliece_niederreiter"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0583", "front": "Compare McEliece and Niederreiter in terms of ciphertexts.", "back": "In McEliece, the ciphertext is a noisy codeword y = mG′ + e. In Niederreiter, the ciphertext is a syndrome c = H′m.", "requirement_id": "REQ-08", "topic": "Mceliece Niederreiter", "difficulty": "medium", "tags": ["recap", "comparison", "mceliece_niederreiter"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0584", "front": "Why can McEliece decryption correct the error?", "back": "After multiplying the ciphertext by P^{-1}, the decryptor obtains a codeword of the secret Goppa code plus an error of weight t. Patterson decoding can correct this error.", "requirement_id": "REQ-04", "topic": "Mceliece", "difficulty": "hard", "tags": ["recap", "correctness", "mceliece"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0585", "front": "Why can Niederreiter decryption recover the plaintext?", "back": "Computing S^{-1}c transforms the public syndrome into a syndrome for the secret Goppa code. Patterson decoding recovers the permuted error vector, and P^{-1} recovers the plaintext.", "requirement_id": "REQ-04", "topic": "Niederreiter", "difficulty": "hard", "tags": ["recap", "correctness", "niederreiter"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0586", "front": "Why are Goppa codes important in McEliece and Niederreiter?", "back": "Goppa codes provide efficient decoding for the legitimate user, while their structure is hidden so that the public code appears hard to decode.", "requirement_id": "REQ-04", "topic": "Goppa Codes", "difficulty": "hard", "tags": ["recap", "goppa_codes"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0587", "front": "What is Patterson’s algorithm used for in code-based schemes?", "back": "Patterson’s algorithm is used to efficiently decode binary Goppa codes, correcting errors in McEliece and recovering error vectors in Niederreiter-like constructions.", "requirement_id": "REQ-04", "topic": "Patterson", "difficulty": "easy", "tags": ["recap", "patterson"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0588", "front": "What is the main performance drawback of Classic McEliece?", "back": "The main drawback of Classic McEliece is its very large public key size.", "requirement_id": "REQ-04", "topic": "Classic Mceliece", "difficulty": "easy", "tags": ["recap", "performance", "classic_mceliece"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0589", "front": "What is the main performance advantage of Classic McEliece?", "back": "Classic McEliece has conservative code-based security and relatively small ciphertexts compared to its public key size.", "requirement_id": "REQ-04", "topic": "Classic Mceliece", "difficulty": "easy", "tags": ["recap", "performance", "classic_mceliece"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0590", "front": "What is the main idea of HQC?", "back": "HQC uses quasi-cyclic codes to reduce public-key size while relying on the hardness of quasi-cyclic syndrome decoding.", "requirement_id": "REQ-04", "topic": "Hqc", "difficulty": "easy", "tags": ["recap", "hqc"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0591", "front": "How does HQC improve over generic code-based constructions?", "back": "HQC exploits quasi-cyclic structure, allowing large matrices to be represented more compactly.", "requirement_id": "REQ-04", "topic": "Hqc", "difficulty": "hard", "tags": ["recap", "hqc"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0592", "front": "What is the price paid by HQC for smaller public keys?", "back": "HQC generally has larger ciphertexts and higher computational costs compared to some other post-quantum KEMs.", "requirement_id": "REQ-04", "topic": "Hqc", "difficulty": "easy", "tags": ["recap", "performance", "hqc"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0593", "front": "Compare Classic McEliece KEM and HQC-KEM.", "back": "Classic McEliece KEM has a very large public key but small ciphertext. HQC-KEM has a much smaller public key but a larger ciphertext.", "requirement_id": "REQ-08", "topic": "Classic Mceliece Hqc", "difficulty": "medium", "tags": ["recap", "comparison", "classic_mceliece_hqc"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0594", "front": "What is the role of the Fujisaki-Okamoto transformation in HQC?", "back": "It transforms the underlying IND-CPA public-key encryption scheme into an IND-CCA2 secure KEM.", "requirement_id": "REQ-04", "topic": "Security", "difficulty": "hard", "tags": ["recap", "hqc", "security"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0595", "front": "Why is the rejection step important in HQC-KEM decapsulation?", "back": "If the recomputed ciphertext does not match the received ciphertext, decapsulation returns a pseudorandom rejection key, helping achieve IND-CCA2 security.", "requirement_id": "REQ-04", "topic": "Security", "difficulty": "hard", "tags": ["recap", "hqc", "security"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0596", "front": "What is the hard problem behind NTRU?", "back": "NTRU security is related to the hardness of recovering small secret polynomials from a public polynomial relation, which can be interpreted through lattice and Ring-LWE-like problems.", "requirement_id": "REQ-06", "topic": "Security", "difficulty": "hard", "tags": ["recap", "ntru", "security"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0597", "front": "What is the key algebraic structure used in NTRU?", "back": "NTRU works in the quotient ring R = Z[X]/(X^N − 1), where polynomial multiplication is performed modulo X^N − 1.", "requirement_id": "REQ-06", "topic": "Ntru", "difficulty": "easy", "tags": ["recap", "ntru"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0598", "front": "Why does multiplication in NTRU behave cyclically?", "back": "Because in R = Z[X]/(X^N − 1), we have X^N ≡ 1, so high-degree terms wrap around.", "requirement_id": "REQ-06", "topic": "Ntru", "difficulty": "hard", "tags": ["recap", "ntru"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0599", "front": "What is the NTRU public key relation?", "back": "The public key is h ≡ F_q ⊛ g mod q, where F_q is the inverse of f modulo q. Equivalently, f ⊛ h ≡ g mod q.", "requirement_id": "REQ-06", "topic": "Keygen", "difficulty": "easy", "tags": ["recap", "ntru", "keygen"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0600", "front": "What is the NTRU ciphertext formula?", "back": "The NTRU ciphertext is c ≡ pϕ ⊛ h + m mod q.", "requirement_id": "REQ-06", "topic": "Encryption", "difficulty": "easy", "tags": ["recap", "ntru", "encryption"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0601", "front": "What is the key step in NTRU decryption?", "back": "The decryptor computes a ≡ f ⊛ c mod q, obtaining a ≡ pϕ ⊛ g + f ⊛ m mod q.", "requirement_id": "REQ-06", "topic": "Decryption", "difficulty": "easy", "tags": ["recap", "ntru", "decryption"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0602", "front": "Why does NTRU decryption recover m?", "back": "If no wrap-around occurs, reducing a modulo p removes the term pϕ ⊛ g, leaving f ⊛ m. Multiplying by F_p, the inverse of f modulo p, recovers m.", "requirement_id": "REQ-06", "topic": "Ntru", "difficulty": "hard", "tags": ["recap", "correctness", "ntru"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0603", "front": "Why is no wrap-around important in NTRU?", "back": "No wrap-around ensures that the centered reduction modulo q preserves the intended small signed coefficients, allowing the later reduction modulo p to recover the message.", "requirement_id": "REQ-06", "topic": "Correctness", "difficulty": "hard", "tags": ["recap", "ntru", "correctness"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0604", "front": "Why can we not simply reduce the NTRU ciphertext modulo p?", "back": "The ciphertext has already been reduced modulo q and may have wrapped around. Therefore, reducing c directly modulo p does not necessarily recover m.", "requirement_id": "REQ-06", "topic": "Correctness", "difficulty": "hard", "tags": ["recap", "ntru", "correctness"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0605", "front": "What are the main attacks against NTRU discussed in the notes?", "back": "The notes discuss brute-force attacks, multiple transmission attacks and lattice-based attacks.", "requirement_id": "REQ-06", "topic": "Attacks", "difficulty": "hard", "tags": ["recap", "ntru", "attacks"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0606", "front": "What is the intuition behind the NTRU lattice attack?", "back": "The secret polynomials f and g correspond to a short vector in a lattice constructed from the public key h, so an attacker tries to find that short vector.", "requirement_id": "REQ-06", "topic": "Attacks", "difficulty": "hard", "tags": ["recap", "ntru", "attacks"], "source_reference": "Notes: NTRU & Falcon chapters"}, {"id": "C0607", "front": "Compare NTRU and McEliece as trapdoor constructions.", "back": "McEliece hides a structured decodable code inside a random-looking code. NTRU hides small secret polynomials inside a public polynomial relation over a quotient ring.", "requirement_id": "REQ-08", "topic": "Ntru Mceliece", "difficulty": "medium", "tags": ["recap", "comparison", "ntru_mceliece"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0608", "front": "Compare NTRU and LWE/Ring-LWE.", "back": "LWE and Ring-LWE are hard noisy-learning problems. NTRU is a concrete lattice-based cryptosystem using polynomial rings and small secret polynomials; its security is often interpreted through related lattice hardness assumptions.", "requirement_id": "REQ-08", "topic": "Ntru Lwe", "difficulty": "medium", "tags": ["recap", "comparison", "ntru_lwe"], "source_reference": "Notes ch.1 (Introduction, NIST) + recap"}, {"id": "C0609", "front": "What is the main difference between SVP and CVP?", "back": "SVP asks for the shortest non-zero vector in a lattice. CVP asks for the lattice vector closest to a given target vector.", "requirement_id": "REQ-05", "topic": "Lattices", "difficulty": "easy", "tags": ["recap", "lattices"], "source_reference": "Notes: Lattices chapt
