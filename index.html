<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PQC Exam Prep — Spaced Repetition</title>
<style>
  :root{
    --paper:#f3f5f2; --surface:#ffffff; --surface-2:#fafbf9;
    --ink:#161a20; --muted:#69727e; --faint:#9aa3ad;
    --line:#e3e7e1; --line-strong:#d2d8d0;
    --accent:#0f9b9b; --accent-deep:#0a6f6f; --accent-wash:#e3f4f3;
    --again:#d6455a; --hard:#c97a16; --good:#2f9e62; --easy:#3576c4;
    --shadow:0 1px 2px rgba(20,24,32,.04),0 8px 24px rgba(20,24,32,.06);
    --radius:14px; --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    --paper:#0e1116; --surface:#161b22; --surface-2:#1b212b;
    --ink:#e8ecf1; --muted:#9aa6b3; --faint:#6b7686;
    --line:#262d38; --line-strong:#323b48;
    --accent:#2bc2c2; --accent-deep:#7fe3e3; --accent-wash:#13302f;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    background-image:radial-gradient(var(--line) 1px,transparent 1px);
    background-size:26px 26px; background-position:-13px -13px;
  }
  html[data-theme="dark"] body{background-image:radial-gradient(#1b2230 1px,transparent 1px)}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--accent-wash)}

  /* Layout */
  .app{max-width:1080px;margin:0 auto;padding:0 20px 64px}
  header.top{
    position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--paper) 88%,transparent);
    backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line);
    margin:0 -20px 26px;padding:14px 20px;
  }
  .top-row{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:18px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:-.02em}
  .glyph{width:30px;height:30px;flex:none}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  nav.tabs{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
  nav.tabs button{
    border:0;background:transparent;color:var(--muted);font-weight:600;font-size:13.5px;
    padding:8px 13px;border-radius:9px;transition:.15s;
  }
  nav.tabs button:hover{color:var(--ink);background:var(--surface)}
  nav.tabs button.active{color:var(--accent-deep);background:var(--surface);box-shadow:var(--shadow)}
  .icon-btn{border:1px solid var(--line);background:var(--surface);border-radius:9px;width:36px;height:34px;color:var(--muted);display:grid;place-items:center}
  .icon-btn:hover{color:var(--ink)}

  h1.view-title{font-size:26px;letter-spacing:-.03em;margin:4px 0 2px}
  .view-sub{color:var(--muted);margin:0 0 22px;font-size:14px}

  /* Cards/grid */
  .grid{display:grid;gap:16px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:820px){.g3,.g4,.g2{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.g3,.g4,.g2{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:18px}

  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat .v{font-size:34px;font-weight:700;letter-spacing:-.03em;margin-top:6px;font-variant-numeric:tabular-nums}
  .stat .v small{font-size:14px;color:var(--faint);font-weight:600}
  .stat .v.accent{color:var(--accent-deep)}

  .cta{
    border:0;background:var(--accent);color:#fff;font-weight:700;font-size:15px;
    padding:13px 22px;border-radius:11px;box-shadow:var(--shadow);transition:.15s;
  }
  .cta:hover{background:var(--accent-deep)}
  .cta:disabled{opacity:.4;cursor:not-allowed}
  .btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);font-weight:600;font-size:13.5px;padding:8px 14px;border-radius:9px}
  .btn:hover{border-color:var(--accent);color:var(--accent-deep)}
  .btn.danger:hover{border-color:var(--again);color:var(--again)}
  .mono{font-family:var(--mono)}
  .pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;border:1px solid var(--line-strong);color:var(--muted);white-space:nowrap}
  .pill.req{color:var(--accent-deep);border-color:var(--accent);background:var(--accent-wash)}
  .tag{font-family:var(--mono);font-size:11px;color:var(--faint);background:var(--surface-2);border:1px solid var(--line);padding:2px 7px;border-radius:7px}

  .diff-easy{color:var(--good)} .diff-medium{color:var(--hard)} .diff-hard{color:var(--again)}

  /* Dashboard requirement bars */
  .reqrow{display:flex;align-items:center;gap:14px;padding:12px 0;border-top:1px solid var(--line)}
  .reqrow:first-child{border-top:0}
  .reqrow .name{font-weight:600;font-size:14px;min-width:0;flex:1}
  .reqrow .name .code{font-family:var(--mono);font-size:11px;color:var(--muted);display:block}
  .bar{height:8px;border-radius:999px;background:var(--line);overflow:hidden;flex:1.4;max-width:320px}
  .bar > i{display:block;height:100%;border-radius:999px;background:var(--accent)}
  .status{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:999px}
  .st-uncovered{background:#f1f3f0;color:var(--faint)} html[data-theme="dark"] .st-uncovered{background:#222a35}
  .st-weak{background:#fbe7ea;color:var(--again)} html[data-theme="dark"] .st-weak{background:#3a2026}
  .st-in_progress{background:#fef0dc;color:var(--hard)} html[data-theme="dark"] .st-in_progress{background:#3a2c12}
  .st-good{background:#e4f4ea;color:var(--good)} html[data-theme="dark"] .st-good{background:#15301f}
  .st-mastered{background:var(--accent-wash);color:var(--accent-deep)}

  /* Review */
  .review-wrap{max-width:720px;margin:0 auto}
  .rev-meta{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:34px 32px;min-height:200px;display:flex;flex-direction:column;justify-content:center}
  .qcard .label{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:12px}
  .qcard .front{font-size:21px;font-weight:600;letter-spacing:-.01em;white-space:pre-wrap}
  .qcard .back{font-size:16.5px;white-space:pre-wrap;line-height:1.62}
  .divider{height:1px;background:var(--line);margin:22px 0}
  .answer{animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
  .rate{border:1px solid var(--line-strong);background:var(--surface);border-radius:12px;padding:12px 8px;text-align:center;font-weight:700;transition:.12s}
  .rate small{display:block;font-weight:600;font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
  .rate:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .rate.again{color:var(--again)} .rate.again:hover{border-color:var(--again)}
  .rate.hard{color:var(--hard)} .rate.hard:hover{border-color:var(--hard)}
  .rate.good{color:var(--good)} .rate.good:hover{border-color:var(--good)}
  .rate.easy{color:var(--easy)} .rate.easy:hover{border-color:var(--easy)}
  .showbtn{width:100%;margin-top:20px}
  .progress-line{height:4px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:22px}
  .progress-line>i{display:block;height:100%;background:var(--accent);transition:width .3s}

  /* Browse / requirements tables */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  input[type=text],input[type=search],select,textarea{
    font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--surface);
    border:1px solid var(--line-strong);border-radius:9px;padding:9px 12px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-wash);border-color:var(--accent)}
  .search{flex:1;min-width:180px}
  .clist{display:flex;flex-direction:column;gap:10px}
  .crow{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .crow .q{font-weight:600;font-size:15px}
  .crow .a{color:var(--muted);font-size:13.5px;margin-top:6px;white-space:pre-wrap;display:none}
  .crow.open .a{display:block;animation:rise .18s ease}
  .crow .meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .crow .row-actions{margin-left:auto;display:flex;gap:6px}
  .mini{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);font-weight:600}
  .mini:hover{color:var(--ink);border-color:var(--accent)}

  table.cov{width:100%;border-collapse:collapse;font-size:13.5px}
  table.cov th,table.cov td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line)}
  table.cov th{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700}
  table.cov td.num{font-variant-numeric:tabular-nums;text-align:right}
  table.cov tr:hover td{background:var(--surface-2)}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(10,14,20,.45);display:none;place-items:center;z-index:50;padding:20px}
  .modal-bg.show{display:grid}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);width:min(620px,100%);max-height:88vh;overflow:auto;padding:24px}
  .modal h3{margin:0 0 16px;letter-spacing:-.02em}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.03em}
  .field textarea{width:100%;min-height:80px;resize:vertical;line-height:1.55}
  .field input,.field select{width:100%}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

  .empty{text-align:center;color:var(--muted);padding:50px 20px}
  .empty .big{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:11px;font-weight:600;font-size:13.5px;opacity:0;transition:.25s;z-index:60;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{font-size:12.5px;color:var(--muted)}
  .row{display:flex;gap:10px;align-items:center}
  .spread{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .sec-h{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:30px 0 12px}
</style>
</head>
<body>
<header class="top">
  <div class="top-row">
    <div class="brand">
      <svg class="glyph" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <g stroke="var(--accent)" stroke-width="1.5">
          <circle cx="6" cy="6" r="1.6" fill="var(--accent)"/><circle cx="16" cy="6" r="1.6" fill="var(--accent)"/><circle cx="26" cy="6" r="1.6" fill="var(--accent)"/>
          <circle cx="6" cy="16" r="1.6" fill="var(--accent)"/><circle cx="26" cy="16" r="1.6" fill="var(--accent)"/>
          <circle cx="6" cy="26" r="1.6" fill="var(--accent)"/><circle cx="16" cy="26" r="1.6" fill="var(--accent)"/><circle cx="26" cy="26" r="1.6" fill="var(--accent)"/>
          <path d="M16 6 L26 16 L16 26 L6 16 Z" stroke="var(--accent-deep)" opacity=".55"/>
        </g>
      </svg>
      <div>PQC Exam Prep<small>Post-Quantum Cryptography</small></div>

    <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">◐</button>
  </div>
</header>

<main class="app" id="view"></main>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script id="seed" type="application/json">{"deck": {"name": "Post-Quantum Cryptography — Exam Prep", "description": "Exam-prep deck for Post-Quantum Cryptography (Murru, a.y. 2024-2025): official syllabus as requirements, lecture notes as the source of answers, pre-made cards as a base, plus question-answer cards modelled on the June/July/September 2025 exams and the simulation. All cards are strictly question -> answer.", "source": "Generated from program.pdf (syllabus) + main.pdf (notes) + .tsv cards"}, "requirements": [{"id": "REQ-01", "code": "ALG", "title": "Algebra", "description": "Definition of groups and cyclic groups; Zn and Z*N; Euclidean algorithm; definition and construction of finite fields.", "source_ref": "Notes ch.2 (Recap of Algebra)", "cognitive_level": "understand/apply"}, {"id": "REQ-02", "code": "LINALG", "title": "Linear Algebra", "description": "Vectors; linear independence; matrices; vector spaces; bases of vector spaces; linear maps.", "source_ref": "Notes ch.3 (Linear Algebra)", "cognitive_level": "understand/apply"}, {"id": "REQ-03", "code": "CODING", "title": "Coding Theory", "description": "Codes (information words, codewords, length, dimension, redundancy, minimum distance); Hamming distance and weight; linear codes; generator matrix; parity-check matrix; syndrome and nearest-codeword decoding.", "source_ref": "Notes ch.4 (Coding Theory)", "cognitive_level": "understand/apply"}, {"id": "REQ-04", "code": "CODEBASED", "title": "Code-based cryptography", "description": "McEliece and Niederreiter cryptosystems (key generation, encryption, decryption, proof of correctness, security); NIST submissions Classic McEliece and HQC; performance discussion.", "source_ref": "Notes ch.5 (Code-based cryptosystems)", "cognitive_level": "analyze/evaluate"}, {"id": "REQ-05", "code": "LATTICE", "title": "Lattices", "description": "Terminology and main properties; basis of a lattice and fundamental domain; Shortest Vector Problem and Closest Vector Problem; Learning With Errors and Ring-LWE.", "source_ref": "Notes: Lattices chapter", "cognitive_level": "understand/analyze"}, {"id": "REQ-06", "code": "LATTICEBASED", "title": "Lattice-based cryptography", "description": "NTRU cryptosystem (key generation, encryption, decryption, proof of correctness, security); NIST submission Falcon; performance discussion.", "source_ref": "Notes: NTRU & Falcon chapters", "cognitive_level": "analyze/evaluate"}, {"id": "REQ-07", "code": "MULTIVAR", "title": "Multivariate cryptography", "description": "Quadratic polynomial systems; digital signatures and encryption schemes; linearization technique; Oil and Vinegar trapdoor and construction; NIST submission UOV.", "source_ref": "Notes: Multivariate chapter", "cognitive_level": "analyze/evaluate"}, {"id": "REQ-08", "code": "NIST-CMP", "title": "NIST submissions, performance & cross-scheme comparison", "description": "Cross-topic comparison of PQC families, NIST standardization, and performance trade-offs across code-based, lattice-based and multivariate schemes.", "source_ref": "Notes ch.1 (Introduction, NIST) + recap", "cognitive_level": "evaluate"}], "cards": [{"id": "C0001", "front": "What is a group?", "back": "An algebraic structure (G, ∗), where G is a set and ∗ is an operation ∗ : G × G → G, is a group if ∗ is associative, there exists an identity element e ∈ G, and every element a ∈ G has an inverse h ∈ G such that a ∗ h = h ∗ a = e.", "requirement_id": "REQ-01", "topic": "Groups", "difficulty": "easy", "tags": ["algebra", "groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0002", "front": "When is a group called abelian?", "back": "A group (G, ∗) is called abelian if the operation ∗ is commutative, i.e., ∀g1, g2 ∈ G, g1 ∗ g2 = g2 ∗ g1.", "requirement_id": "REQ-01", "topic": "Groups", "difficulty": "easy", "tags": ["algebra", "groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0003", "front": "What is the identity element in a group?", "back": "The identity element is an element e ∈ G such that ∀a ∈ G, e ∗ a = a ∗ e = a.", "requirement_id": "REQ-01", "topic": "Groups", "difficulty": "easy", "tags": ["algebra", "groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0004", "front": "What is the inverse element in a group?", "back": "For an element a ∈ G, an inverse is an element h ∈ G such that a ∗ h = h ∗ a = e, where e is the identity element of the group.", "requirement_id": "REQ-01", "topic": "Groups", "difficulty": "easy", "tags": ["algebra", "groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0005", "front": "What is the difference between additive and multiplicative notation for groups?", "back": "In additive notation, the operation is +, the identity is 0, and the inverse of g is −g. In multiplicative notation, the operation is ·, the identity is 1, and the inverse of g is g⁻¹.", "requirement_id": "REQ-01", "topic": "Notation", "difficulty": "easy", "tags": ["algebra", "groups", "notation"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0006", "front": "What is a cyclic group?", "back": "A group G is called cyclic if there exists at least one element g ∈ G such that G = \u003cg> = (g), where \u003cg> = (g) = {g^k : k ∈ Z} = {kg : k ∈ Z}. In this case, G is generated by g and g is called a generator of G.", "requirement_id": "REQ-01", "topic": "Cyclic Groups", "difficulty": "easy", "tags": ["algebra", "cyclic_groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0007", "front": "What is a generator of a cyclic group?", "back": "A generator of a cyclic group G is an element g ∈ G such that every element of G can be obtained as g^k, or as kg in additive notation, for some k ∈ Z.", "requirement_id": "REQ-01", "topic": "Cyclic Groups", "difficulty": "easy", "tags": ["algebra", "cyclic_groups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0008", "front": "What does it mean intuitively that a group is cyclic?", "back": "It means that the whole group can be generated from a single element by repeatedly applying the group operation.", "requirement_id": "REQ-01", "topic": "Intuition", "difficulty": "easy", "tags": ["algebra", "cyclic_groups", "intuition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0009", "front": "What is a subgroup?", "back": "A subgroup H of a group G is a subset of G that is itself a group under the operation of G.", "requirement_id": "REQ-01", "topic": "Subgroups", "difficulty": "easy", "tags": ["algebra", "subgroups", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0010", "front": "Why is (N, +) not a group?", "back": "(N, +) is not a group because it lacks inverses: for a positive natural number n, the inverse −n is not in N.", "requirement_id": "REQ-01", "topic": "Examples", "difficulty": "hard", "tags": ["algebra", "groups", "examples"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0011", "front": "Why is (Z, +) a cyclic group?", "back": "(Z, +) is cyclic because it is generated by 1, or equivalently by −1. Every integer can be obtained by repeatedly adding 1 or −1.", "requirement_id": "REQ-01", "topic": "Examples", "difficulty": "hard", "tags": ["algebra", "cyclic_groups", "examples"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0012", "front": "Why is (Q, ·) not a group?", "back": "(Q, ·) is not a group because 0 does not have a multiplicative inverse.", "requirement_id": "REQ-01", "topic": "Examples", "difficulty": "hard", "tags": ["algebra", "groups", "examples"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0013", "front": "What is Z_N?", "back": "Z_N^* = {a ∈ Z_N : gcd(a, N) = 1}. It is the set of invertible elements of Z_N with respect to multiplication.", "requirement_id": "REQ-01", "topic": "Zn", "difficulty": "easy", "tags": ["algebra", "zn", "definition", "zn_star"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0014", "front": "How is Z_N constructed from Z?", "back": "Z_N is constructed from Z by introducing the equivalence relation a ≡ b mod N, meaning that N divides a − b. This partitions Z into N equivalence classes, each represented by one remainder.", "requirement_id": "REQ-01", "topic": "Construction", "difficulty": "medium", "tags": ["algebra", "zn", "construction"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0015", "front": "When are two integers a and b equivalent modulo N?", "back": "Two integers a, b ∈ Z are equivalent modulo N if N divides a − b, i.e., if there exists k ∈ Z such that a − b = kN.", "requirement_id": "REQ-01", "topic": "Modular Arithmetic", "difficulty": "medium", "tags": ["algebra", "modular_arithmetic", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0016", "front": "When is an element a ∈ Z_N invertible with respect to multiplication?", "back": "An element a ∈ Z_N is invertible with respect to multiplication if and only if gcd(a, N) = 1.", "requirement_id": "REQ-01", "topic": "Zn Star", "difficulty": "easy", "tags": ["algebra", "zn_star", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0017", "front": "What is Euler’s totient function φ(N)?", "back": "Euler’s totient function φ(N) is defined as φ(N) = |Z_N^*|, i.e., the number of invertible elements in Z_N.", "requirement_id": "REQ-01", "topic": "Euler Phi", "difficulty": "easy", "tags": ["algebra", "euler_phi", "definition"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0018", "front": "What is φ(p) if p is prime?", "back": "If p is prime, then φ(p) = p − 1.", "requirement_id": "REQ-01", "topic": "Formula", "difficulty": "easy", "tags": ["algebra", "euler_phi", "formula"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0019", "front": "What is φ(ab) when a and b are coprime?", "back": "If a and b are coprime positive integers, then φ(ab) = φ(a) · φ(b).", "requirement_id": "REQ-01", "topic": "Formula", "difficulty": "easy", "tags": ["algebra", "euler_phi", "formula"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0020", "front": "Why is φ(N) important in RSA?", "back": "If we know the factorization of N, we can compute φ(N), and vice versa. Therefore, computing φ(N) is as hard as factoring N, which is why φ(N) is used in RSA.", "requirement_id": "REQ-01", "topic": "Connection", "difficulty": "hard", "tags": ["algebra", "rsa", "connection"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0021", "front": "How can we compute the inverse of an element in Z_N^*?", "back": "Given a ∈ Z_N^*, i.e., gcd(a, N) = 1, its inverse can be found using Bézout’s identity, which can be determined by the Extended Euclidean Algorithm.", "requirement_id": "REQ-01", "topic": "Inverse", "difficulty": "medium", "tags": ["algebra", "euclidean_algorithm", "inverse"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0022", "front": "What is the time complexity of the Extended Euclidean Algorithm?", "back": "The time complexity of the Extended Euclidean Algorithm is O(log N), so the inverse of an element in Z_N^* can be computed in polynomial time.", "requirement_id": "REQ-01", "topic": "Complexity", "difficulty": "easy", "tags": ["algebra", "euclidean_algorithm", "complexity"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0023", "front": "Why is (Z_N, +) a cyclic group?", "back": "(Z_N, +) is cyclic because 1 is a generator: \u003c1> = Z_N.", "requirement_id": "REQ-01", "topic": "Zn", "difficulty": "hard", "tags": ["algebra", "cyclic_groups", "zn"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0024", "front": "Which elements generate (Z_N, +)?", "back": "The generators of (Z_N, +) are the elements a ∈ Z_N such that gcd(a, N) = 1.", "requirement_id": "REQ-01", "topic": "Zn", "difficulty": "medium", "tags": ["algebra", "cyclic_groups", "zn"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0025", "front": "How many generators does Z_N have?", "back": "The number of generators of Z_N is φ(N).", "requirement_id": "REQ-01", "topic": "Zn", "difficulty": "medium", "tags": ["algebra", "cyclic_groups", "zn"], "source_reference": "Notes ch.2 (Recap of Algebra)"}, {"id": "C0026", "front": "What is linear algebra?", "back": "Linear algebra is the branch of mathematics that studies vectors, vector spaces, matrices and linear transformations, namely linear objects.", "requirement_id": "REQ-07", "topic": "Linear Algebra", "difficulty": "easy", "tags": ["linear_algebra", "overview"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0027", "front": "What is a vector in R^n?", "back": "A vector v ∈ R^n is an n-tuple of real numbers, written as v = (v1, v2, ..., vn).", "requirement_id": "REQ-02", "topic": "Vectors", "difficulty": "easy", "tags": ["linear_algebra", "vectors", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0028", "front": "How is scalar multiplication defined for vectors?", "back": "Given t ∈ R and v = (v1, v2, ..., vn) ∈ R^n, scalar multiplication is defined as tv = (tv1, tv2, ..., tvn).", "requirement_id": "REQ-02", "topic": "Operations", "difficulty": "medium", "tags": ["linear_algebra", "vectors", "operations"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0029", "front": "How is the sum of two vectors defined?", "back": "Given v, w ∈ R^n, with v = (v1, ..., vn) and w = (w1, ..., wn), their sum is v + w = (v1 + w1, ..., vn + wn).", "requirement_id": "REQ-02", "topic": "Operations", "difficulty": "medium", "tags": ["linear_algebra", "vectors", "operations"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0030", "front": "How is the dot product of two vectors defined?", "back": "Given v, w ∈ R^n, the dot product is v · w = v1w1 + v2w2 + ... + vnwn.", "requirement_id": "REQ-02", "topic": "Dot Product", "difficulty": "medium", "tags": ["linear_algebra", "vectors", "dot_product"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0031", "front": "How is the norm of a vector defined?", "back": "Given v = (v1, v2, ..., vn) ∈ R^n, its norm is ||v|| = sqrt(v1^2 + v2^2 + ... + vn^2).", "requirement_id": "REQ-02", "topic": "Norm", "difficulty": "medium", "tags": ["linear_algebra", "vectors", "norm"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0032", "front": "What does it mean for vectors to be linearly dependent?", "back": "Given vectors a1, a2, ..., ak in R^n, they are linearly dependent if there exist scalars t1, t2, ..., tk, not all zero, such that t1a1 + t2a2 + ... + tkak = 0.", "requirement_id": "REQ-02", "topic": "Linear Independence", "difficulty": "easy", "tags": ["linear_algebra", "linear_independence", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0033", "front": "What does it mean for vectors to be linearly independent?", "back": "Vectors a1, a2, ..., ak are linearly independent if the only solution of t1a1 + t2a2 + ... + tkak = 0 is t1 = t2 = ... = tk = 0.", "requirement_id": "REQ-02", "topic": "Linear Independence", "difficulty": "easy", "tags": ["linear_algebra", "linear_independence", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0034", "front": "What is the intuitive meaning of linear dependence?", "back": "Linear dependence means that at least one vector can be written as a linear combination of the others.", "requirement_id": "REQ-02", "topic": "Intuition", "difficulty": "easy", "tags": ["linear_algebra", "linear_independence", "intuition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0035", "front": "What is the intuitive meaning of linear independence?", "back": "Linear independence means that no vector in the set is redundant: none of them can be obtained as a linear combination of the others.", "requirement_id": "REQ-02", "topic": "Intuition", "difficulty": "easy", "tags": ["linear_algebra", "linear_independence", "intuition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0036", "front": "Why is linear independence relevant in cryptography?", "back": "Linear independence is relevant because many cryptographic problems involve systems of equations. If equations are independent, they cannot be easily simplified by combining them with each other.", "requirement_id": "REQ-02", "topic": "Crypto Connection", "difficulty": "hard", "tags": ["linear_algebra", "linear_independence", "crypto_connection"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0037", "front": "What is a matrix?", "back": "A matrix is a rectangular array of numbers, symbols, or expressions arranged in rows and columns.", "requirement_id": "REQ-02", "topic": "Matrices", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0038", "front": "What is an m × n matrix?", "back": "Given m, n ∈ N, an m × n matrix A is a table of mn elements arranged in m rows and n columns.", "requirement_id": "REQ-02", "topic": "Matrices", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0039", "front": "What is a square matrix?", "back": "A matrix is square if it has the same number of rows and columns, i.e., if m = n.", "requirement_id": "REQ-02", "topic": "Classification", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "classification"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0040", "front": "What is a row vector?", "back": "A row vector is a matrix with one row, i.e., a matrix of size 1 × n.", "requirement_id": "REQ-02", "topic": "Classification", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "classification"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0041", "front": "What is a column vector?", "back": "A column vector is a matrix with one column, i.e., a matrix of size m × 1.", "requirement_id": "REQ-02", "topic": "Classification", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "classification"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0042", "front": "How is scalar multiplication defined for matrices?", "back": "Given a scalar t and a matrix A = (aij), scalar multiplication is defined as tA = (t aij).", "requirement_id": "REQ-02", "topic": "Operations", "difficulty": "medium", "tags": ["linear_algebra", "matrices", "operations"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0043", "front": "How is the sum of two matrices defined?", "back": "Given two matrices A = (aij) and B = (bij) of the same size, their sum is A + B = (aij + bij).", "requirement_id": "REQ-02", "topic": "Operations", "difficulty": "medium", "tags": ["linear_algebra", "matrices", "operations"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0044", "front": "What is the transpose of a matrix?", "back": "The transpose of a matrix A, denoted A^T, is obtained by swapping rows and columns. If A = (aij), then A^T = (aji).", "requirement_id": "REQ-02", "topic": "Transpose", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "transpose"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0045", "front": "When is the product AB of two matrices defined?", "back": "The product AB is defined when the number of columns of A is equal to the number of rows of B. If A ∈ R^{m×n} and B ∈ R^{n×r}, then AB ∈ R^{m×r}.", "requirement_id": "REQ-02", "topic": "Product", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "product"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0046", "front": "How is matrix multiplication computed?", "back": "The element cij of the product AB is obtained by performing the dot product between the i-th row of A and the j-th column of B.", "requirement_id": "REQ-02", "topic": "Product", "difficulty": "medium", "tags": ["linear_algebra", "matrices", "product"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0047", "front": "Is matrix multiplication commutative?", "back": "In general, matrix multiplication is not commutative: AB and BA may be different, and one of them may even be undefined.", "requirement_id": "REQ-02", "topic": "Product", "difficulty": "medium", "tags": ["linear_algebra", "matrices", "product"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0048", "front": "What is the identity matrix?", "back": "The identity matrix In of size n × n is the square matrix with 1 on the main diagonal and 0 elsewhere.", "requirement_id": "REQ-02", "topic": "Identity", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "identity"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0049", "front": "What is the determinant of a 2 × 2 matrix?", "back": "Given A = [[a, b], [c, d]], its determinant is det(A) = ad − bc.", "requirement_id": "REQ-02", "topic": "Determinant", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "determinant"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0050", "front": "When is a square matrix invertible?", "back": "A square matrix is invertible if and only if its determinant is non-zero.", "requirement_id": "REQ-02", "topic": "Invertibility", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "invertibility"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0051", "front": "What is the trace of a matrix?", "back": "The trace of a square matrix A = (aij) is the sum of the elements on the main diagonal: tr(A) = a11 + a22 + ... + ann.", "requirement_id": "REQ-02", "topic": "Trace", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "trace"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0052", "front": "What is the time complexity of standard matrix multiplication for n × n matrices?", "back": "The standard algorithm for multiplying two n × n matrices has time complexity O(n^3).", "requirement_id": "REQ-02", "topic": "Complexity", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "complexity"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0053", "front": "What is the time complexity of Gauss-Jordan matrix inversion?", "back": "The standard Gauss-Jordan elimination algorithm for inverting an n × n matrix has time complexity O(n^3).", "requirement_id": "REQ-02", "topic": "Complexity", "difficulty": "easy", "tags": ["linear_algebra", "matrices", "complexity"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0054", "front": "What is a vector space?", "back": "A vector space over R or C is a set V with vector addition and scalar multiplication satisfying the usual properties: addition is associative and commutative, has identity and inverses, and scalar multiplication is associative and distributive.", "requirement_id": "REQ-02", "topic": "Vector Spaces", "difficulty": "easy", "tags": ["linear_algebra", "vector_spaces", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0055", "front": "Why is R^n a vector space over R?", "back": "R^n is a vector space over R because vectors in R^n can be added together and multiplied by real scalars, and these operations satisfy the vector space properties.", "requirement_id": "REQ-02", "topic": "Examples", "difficulty": "hard", "tags": ["linear_algebra", "vector_spaces", "examples"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0056", "front": "Why is R^{m×n} a vector space over R?", "back": "The set of m × n real matrices is a vector space over R because matrices can be added and multiplied by real scalars, and these operations satisfy the vector space properties.", "requirement_id": "REQ-02", "topic": "Examples", "difficulty": "hard", "tags": ["linear_algebra", "vector_spaces", "examples"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0057", "front": "Can R^n be considered a vector space over F_q?", "back": "No. R^n is not a vector space over F_q because scalar multiplication by elements of F_q is not compatible with the real-number structure of R^n.", "requirement_id": "REQ-02", "topic": "Fields", "difficulty": "medium", "tags": ["linear_algebra", "vector_spaces", "fields"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0058", "front": "Can F_q^n be considered a vector space over F_q?", "back": "Yes. F_q^n is a vector space over F_q because vectors have entries in F_q and scalar multiplication is defined for all scalars in F_q.", "requirement_id": "REQ-02", "topic": "Finite Fields", "difficulty": "medium", "tags": ["linear_algebra", "vector_spaces", "finite_fields"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0059", "front": "What is a basis of a vector space?", "back": "A basis is a set of vectors that generates all the vectors of the space by linear combinations and whose vectors are linearly independent.", "requirement_id": "REQ-02", "topic": "Basis", "difficulty": "easy", "tags": ["linear_algebra", "basis", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0060", "front": "What is the dimension of a vector space?", "back": "The dimension of a vector space is the number of vectors in one of its bases.", "requirement_id": "REQ-02", "topic": "Dimension", "difficulty": "easy", "tags": ["linear_algebra", "basis", "dimension"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0061", "front": "What is the standard basis of R^3?", "back": "The standard basis of R^3 is e1 = (1, 0, 0), e2 = (0, 1, 0), and e3 = (0, 0, 1).", "requirement_id": "REQ-02", "topic": "Examples", "difficulty": "easy", "tags": ["linear_algebra", "basis", "examples"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0062", "front": "What is a linear map?", "back": "A linear map, or linear transformation, is a function between two vector spaces that preserves vector addition and scalar multiplication.", "requirement_id": "REQ-02", "topic": "Linear Maps", "difficulty": "easy", "tags": ["linear_algebra", "linear_maps", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0063", "front": "What properties must a linear map satisfy?", "back": "A function f : V → W is linear if, for all v1, v2 ∈ V and scalars k, f(v1 + v2) = f(v1) + f(v2) and f(kv) = kf(v).", "requirement_id": "REQ-02", "topic": "Linear Maps", "difficulty": "medium", "tags": ["linear_algebra", "linear_maps", "definition"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0064", "front": "How can a linear map be represented?", "back": "A linear map can be represented by a matrix. If A is a matrix and v is a vector, then the map can be written as f(v) = Av.", "requirement_id": "REQ-02", "topic": "Matrix Representation", "difficulty": "medium", "tags": ["linear_algebra", "linear_maps", "matrix_representation"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0065", "front": "What is the relation between matrices and linear maps?", "back": "Matrices provide a concrete representation of linear maps: multiplying a vector by a matrix applies the corresponding linear transformation.", "requirement_id": "REQ-02", "topic": "Matrix Representation", "difficulty": "easy", "tags": ["linear_algebra", "linear_maps", "matrix_representation"], "source_reference": "Notes ch.3 (Linear Algebra)"}, {"id": "C0066", "front": "What is coding theory?", "back": "Coding theory is the branch of mathematics that studies the properties of codes, especially their error-detection and error-correction capabilities.", "requirement_id": "REQ-07", "topic": "Coding Theory", "difficulty": "easy", "tags": ["coding_theory", "overview"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0067", "front": "What is the encoding step in coding theory?", "back": "The encoding step transforms the original message into a codeword using a specific encoding scheme.", "requirement_id": "REQ-03", "topic": "Coding Theory", "difficulty": "easy", "tags": ["coding_theory", "basic_model"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0068", "front": "What happens during transmission in coding theory?", "back": "During transmission, the codeword is sent through a communication channel, which may introduce errors.", "requirement_id": "REQ-03", "topic": "Coding Theory", "difficulty": "medium", "tags": ["coding_theory", "basic_model"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0069", "front": "What is the decoding step in coding theory?", "back": "The decoding step processes the received word in order to recover the original message, possibly by detecting and correcting errors.", "requirement_id": "REQ-03", "topic": "Coding Theory", "difficulty": "easy", "tags": ["coding_theory", "basic_model"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0070", "front": "What is the finite alphabet F in coding theory?", "back": "F is the finite alphabet, i.e. the set of symbols used to construct codewords. For binary codes, F = {0, 1}.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0071", "front": "What is an information word?", "back": "An information word, or message, is m ∈ F^k. It is the original data that we want to encode and consists of k symbols from the alphabet F.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0072", "front": "What is a codeword?", "back": "A codeword is c ∈ F^n. It is the encoded version of the message and consists of n symbols from the alphabet F, with n ≥ k.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0073", "front": "What is a received word?", "back": "A received word is y ∈ F^n. It is the word obtained after transmission through the channel and may contain errors.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0074", "front": "What is a decoded word?", "back": "A decoded word is ĉ ∈ F^n, i.e. the word recovered by the decoder as an estimate of the original codeword.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0075", "front": "What is a decoded message?", "back": "A decoded message is m̂ ∈ F^k, i.e. the message recovered by the decoder as an estimate of the original information word.", "requirement_id": "REQ-03", "topic": "Definitions", "difficulty": "easy", "tags": ["coding_theory", "definitions"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0076", "front": "What is an additive channel?", "back": "An additive channel is a channel where the received word has the form y = c + e, where c is the transmitted codeword and e is the error vector.", "requirement_id": "REQ-03", "topic": "Channels", "difficulty": "easy", "tags": ["coding_theory", "channels"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0077", "front": "What is an error vector?", "back": "The error vector, or error word, is e ∈ F^n and represents the errors introduced by the channel. In an additive channel, y = c + e.", "requirement_id": "REQ-03", "topic": "Channels", "difficulty": "easy", "tags": ["coding_theory", "channels"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0078", "front": "What is an (n, M)-code?", "back": "An (n, M)-code C is a non-empty subset of F^n with M codewords. The parameter n is the length of the codewords and M is the size of the code.", "requirement_id": "REQ-03", "topic": "Codes", "difficulty": "easy", "tags": ["coding_theory", "codes", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0079", "front": "What is the length of a code?", "back": "The length n of a code is the number of symbols in each codeword.", "requirement_id": "REQ-03", "topic": "Parameters", "difficulty": "easy", "tags": ["coding_theory", "codes", "parameters"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0080", "front": "What is the size of a code?", "back": "The size M of a code is the number of codewords contained in the code.", "requirement_id": "REQ-03", "topic": "Parameters", "difficulty": "easy", "tags": ["coding_theory", "codes", "parameters"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0081", "front": "What is the dimension of a code?", "back": "The dimension, or information length, of a code is k = log_|F|(M), where M is the number of codewords and |F| is the size of the alphabet.", "requirement_id": "REQ-03", "topic": "Parameters", "difficulty": "easy", "tags": ["coding_theory", "codes", "parameters"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0082", "front": "What is the rate of a code?", "back": "The rate of a code is R = k/n, where k is the dimension and n is the length of the code.", "requirement_id": "REQ-03", "topic": "Parameters", "difficulty": "easy", "tags": ["coding_theory", "codes", "parameters"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0083", "front": "What is redundancy in coding theory?", "back": "Redundancy is the part added to the information symbols in order to detect or correct errors. For a linear [n, k, d]-code, the redundancy is n − k.", "requirement_id": "REQ-03", "topic": "Parameters", "difficulty": "easy", "tags": ["coding_theory", "codes", "parameters"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0084", "front": "What is the Hamming distance?", "back": "Given x, y ∈ F^n, the Hamming distance d(x, y) is the number of positions in which x and y differ.", "requirement_id": "REQ-03", "topic": "Hamming Distance", "difficulty": "easy", "tags": ["coding_theory", "hamming_distance", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0085", "front": "What is the Hamming weight?", "back": "Given x ∈ F^n, the Hamming weight w(x) is the number of non-zero coordinates of x.", "requirement_id": "REQ-03", "topic": "Hamming Weight", "difficulty": "easy", "tags": ["coding_theory", "hamming_weight", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0086", "front": "What is the minimum distance of a code?", "back": "Given a code C, the minimum distance is d = min{d(c1, c2) : c1, c2 ∈ C, c1 ≠ c2}.", "requirement_id": "REQ-03", "topic": "Minimum Distance", "difficulty": "easy", "tags": ["coding_theory", "minimum_distance", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0087", "front": "Why is the minimum distance important?", "back": "The minimum distance determines the error-detection and error-correction capabilities of the code. A larger minimum distance allows the code to detect and correct more errors.", "requirement_id": "REQ-03", "topic": "Importance", "difficulty": "hard", "tags": ["coding_theory", "minimum_distance", "importance"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0088", "front": "How many errors can a code with minimum distance d detect?", "back": "A code with minimum distance d can detect up to d − 1 errors.", "requirement_id": "REQ-03", "topic": "Formula", "difficulty": "medium", "tags": ["coding_theory", "error_detection", "formula"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0089", "front": "How many errors can a code with minimum distance d correct?", "back": "A code with minimum distance d can correct up to floor((d − 1)/2) errors.", "requirement_id": "REQ-03", "topic": "Formula", "difficulty": "medium", "tags": ["coding_theory", "error_correction", "formula"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0090", "front": "What is a sphere of radius r in F^n?", "back": "Given x ∈ F^n and r ∈ N, the sphere of radius r and center x is S(x, r) = {x' ∈ F^n : d(x, x') ≤ r}.", "requirement_id": "REQ-03", "topic": "Spheres", "difficulty": "easy", "tags": ["coding_theory", "spheres", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0091", "front": "What is the intuition behind a sphere centered at a codeword?", "back": "A sphere centered at a codeword c contains all words that can be obtained from c by introducing at most r errors.", "requirement_id": "REQ-03", "topic": "Intuition", "difficulty": "easy", "tags": ["coding_theory", "spheres", "intuition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0092", "front": "When does a code detect h errors?", "back": "A code C detects h errors if, for every codeword c ∈ C, the sphere of radius h centered at c contains no other codeword besides c itself.", "requirement_id": "REQ-03", "topic": "Condition", "difficulty": "medium", "tags": ["coding_theory", "error_detection", "condition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0093", "front": "When does a code correct h errors?", "back": "A code C corrects h errors if the spheres of radius h centered at distinct codewords are disjoint.", "requirement_id": "REQ-03", "topic": "Condition", "difficulty": "medium", "tags": ["coding_theory", "error_correction", "condition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0094", "front": "What is a linear code?", "back": "A code C with parameters (n, M, d) is called linear if C is a linear subspace of F_q^n over F_q.", "requirement_id": "REQ-03", "topic": "Linear Codes", "difficulty": "easy", "tags": ["coding_theory", "linear_codes", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0095", "front": "What notation is used for linear codes?", "back": "For linear codes, the notation [n, k, d] is used, where n is the length, k is the dimension, and d is the minimum distance.", "requirement_id": "REQ-03", "topic": "Notation", "difficulty": "medium", "tags": ["coding_theory", "linear_codes", "notation"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0096", "front": "What is a key property of linear codes?", "back": "In a linear code, any linear combination of codewords is still a codeword.", "requirement_id": "REQ-03", "topic": "Property", "difficulty": "easy", "tags": ["coding_theory", "linear_codes", "property"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0097", "front": "Why is the zero vector always a codeword in a linear code?", "back": "A linear code is a linear subspace, and every linear subspace contains the zero vector.", "requirement_id": "REQ-03", "topic": "Property", "difficulty": "hard", "tags": ["coding_theory", "linear_codes", "property"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0098", "front": "How can the minimum distance of a linear code be computed?", "back": "For a linear code C, the minimum distance is d = min{w(x) : x ∈ C, x ≠ 0}.", "requirement_id": "REQ-03", "topic": "Minimum Distance", "difficulty": "medium", "tags": ["coding_theory", "linear_codes", "minimum_distance"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0099", "front": "Why is minimum distance easier to compute for linear codes?", "back": "For a general code, one must compare all pairs of codewords. For a linear code, it is enough to compute the minimum Hamming weight among all non-zero codewords.", "requirement_id": "REQ-03", "topic": "Minimum Distance", "difficulty": "hard", "tags": ["coding_theory", "linear_codes", "minimum_distance"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0100", "front": "What is a generator matrix?", "back": "Given a linear code C with parameters [n, k, d], a generator matrix G is a k × n matrix whose rows form a basis for C.", "requirement_id": "REQ-03", "topic": "Generator Matrix", "difficulty": "easy", "tags": ["coding_theory", "generator_matrix", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0101", "front": "How are codewords obtained from a generator matrix?", "back": "All codewords are obtained as c = mG, where m ∈ F_q^k is an information word. Equivalently, C = {mG : m ∈ F_q^k}.", "requirement_id": "REQ-03", "topic": "Encoding", "difficulty": "medium", "tags": ["coding_theory", "generator_matrix", "encoding"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0102", "front": "Why does a generator matrix completely determine a linear code?", "back": "Because all codewords of the code are generated by multiplying all possible information words m ∈ F_q^k by G.", "requirement_id": "REQ-03", "topic": "Property", "difficulty": "hard", "tags": ["coding_theory", "generator_matrix", "property"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0103", "front": "What is a systematic generator matrix?", "back": "A generator matrix G is systematic if it has the form G = (I | A), where I is the k × k identity matrix and A is a k × (n − k) matrix.", "requirement_id": "REQ-03", "topic": "Systematic", "difficulty": "easy", "tags": ["coding_theory", "generator_matrix", "systematic"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0104", "front": "What is the advantage of a systematic generator matrix?", "back": "If G = (I | A), then c = mG has the form c = (m1, ..., mk | p1, ..., p_{n−k}), so the information word appears directly in the first k coordinates of the codeword.", "requirement_id": "REQ-03", "topic": "Systematic", "difficulty": "easy", "tags": ["coding_theory", "generator_matrix", "systematic"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0105", "front": "When does a linear code admit a systematic generator matrix?", "back": "A linear code admits a systematic generator matrix if and only if the first k columns of a generator matrix are linearly independent.", "requirement_id": "REQ-03", "topic": "Systematic", "difficulty": "medium", "tags": ["coding_theory", "generator_matrix", "systematic"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0106", "front": "How is the dot product defined in F_q^n?", "back": "For x, y ∈ F_q^n, the dot product is x · y = x1y1 + x2y2 + ... + xnyn.", "requirement_id": "REQ-03", "topic": "Dot Product", "difficulty": "medium", "tags": ["coding_theory", "dual_code", "dot_product"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0107", "front": "What is the dual code?", "back": "Given a linear code C ⊆ F_q^n, the dual code is C^⊥ = {x ∈ F_q^n : x · y = 0 for all y ∈ C}.", "requirement_id": "REQ-03", "topic": "Dual Code", "difficulty": "easy", "tags": ["coding_theory", "dual_code", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0108", "front": "What is a parity-check matrix?", "back": "The parity-check matrix H of a linear code C is the generator matrix of the dual code C^⊥.", "requirement_id": "REQ-03", "topic": "Parity Check Matrix", "difficulty": "easy", "tags": ["coding_theory", "parity_check_matrix", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0109", "front": "How can we test whether y belongs to a linear code using H?", "back": "Given a received word y ∈ F_q^n and a parity-check matrix H, we have y ∈ C if and only if yH^T = 0.", "requirement_id": "REQ-03", "topic": "Membership", "difficulty": "medium", "tags": ["coding_theory", "parity_check_matrix", "membership"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0110", "front": "What is H when G = (I_k | A)?", "back": "If G = (I_k | A), then a parity-check matrix is H = (−A^T | I_{n−k}).", "requirement_id": "REQ-03", "topic": "Systematic", "difficulty": "easy", "tags": ["coding_theory", "parity_check_matrix", "systematic"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0111", "front": "What is nearest-codeword decoding?", "back": "Nearest-codeword decoding consists in finding, for a received word y ∈ F_q^n, a codeword c ∈ C that minimizes the Hamming distance d(y, c).", "requirement_id": "REQ-03", "topic": "Nearest Codeword", "difficulty": "easy", "tags": ["coding_theory", "decoding", "nearest_codeword"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0112", "front": "What is the equivalent error-vector formulation of nearest-codeword decoding?", "back": "Equivalently, nearest-codeword decoding means finding an error vector e ∈ F_q^n of minimum Hamming weight such that y − e ∈ C.", "requirement_id": "REQ-03", "topic": "Nearest Codeword", "difficulty": "easy", "tags": ["coding_theory", "decoding", "nearest_codeword"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0113", "front": "What is the syndrome of a received word?", "back": "Let C be a linear [n, k, d]-code and H a parity-check matrix. The syndrome of y ∈ F_q^n is s(y) = yH^T.", "requirement_id": "REQ-03", "topic": "Syndrome", "difficulty": "easy", "tags": ["coding_theory", "syndrome", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0114", "front": "What is the codomain of the syndrome map?", "back": "The syndrome map is s : F_q^n → F_q^{n−k}, because H has n − k rows.", "requirement_id": "REQ-03", "topic": "Syndrome", "difficulty": "easy", "tags": ["coding_theory", "syndrome", "definition"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0115", "front": "Why does the syndrome depend only on the error?", "back": "If y = c + e with c ∈ C, then s(y) = yH^T = (c + e)H^T = cH^T + eH^T = 0 + s(e) = s(e).", "requirement_id": "REQ-03", "topic": "Property", "difficulty": "hard", "tags": ["coding_theory", "syndrome", "property"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0116", "front": "What does syndrome zero mean?", "back": "If s(y) = 0, then yH^T = 0, so y belongs to the code C. This means that no error is detected.", "requirement_id": "REQ-03", "topic": "Interpretation", "difficulty": "easy", "tags": ["coding_theory", "syndrome", "interpretation"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0117", "front": "What does a non-zero syndrome mean?", "back": "If s(y) ≠ 0, then y is not a codeword, so an error has been detected.", "requirement_id": "REQ-03", "topic": "Interpretation", "difficulty": "easy", "tags": ["coding_theory", "syndrome", "interpretation"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0118", "front": "How are syndromes used to correct errors?", "back": "One pre-computes the syndromes of all correctable errors. Given y, compute s(y). If s(y) = s(e) for some correctable error e, correct y by computing y − e.", "requirement_id": "REQ-03", "topic": "Decoding", "difficulty": "medium", "tags": ["coding_theory", "syndrome", "decoding"], "source_reference": "Notes ch.4 (Coding Theory)"}, {"id": "C0119", "front": "What is a Goppa code?", "back": "A binary Goppa code is a linear code defined using a particular parity-check matrix and equipped with an efficient decoding method for correcting errors.", "requirement_id": "REQ-04", "topic": "Goppa Codes", "difficulty": "easy", "tags": ["coding_theory", "goppa_codes", "definition"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0120", "front": "Why are Goppa codes important in code-based cryptography?", "back": "Goppa codes are important because they have efficient decoding algorithms while looking hard to decode when their structure is hidden, which is the basis of McEliece.", "requirement_id": "REQ-04", "topic": "Crypto Connection", "difficulty": "hard", "tags": ["coding_theory", "goppa_codes", "crypto_connection"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0121", "front": "What is the Patterson algorithm used for?", "back": "The Patterson algorithm is used to efficiently correct errors in binary Goppa codes by finding the error-locating polynomial associated with a received word.", "requirement_id": "REQ-04", "topic": "Patterson", "difficulty": "easy", "tags": ["coding_theory", "goppa_codes", "patterson"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0122", "front": "Compare error correction in unstructured, linear and Goppa codes.", "back": "For an unstructured code, decoding requires comparison with codewords. For a linear code, errors are detected using syndromes and corrected using precomputed syndrome tables. For a Goppa code, errors are detected as in linear codes but corrected efficiently using Patterson’s algorithm.", "requirement_id": "REQ-04", "topic": "Summary", "difficulty": "medium", "tags": ["coding_theory", "summary"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0123", "front": "What is code-based cryptography based on?", "back": "Code-based cryptography is based on the hardness of decoding random linear codes.", "requirement_id": "REQ-07", "topic": "Code Based", "difficulty": "easy", "tags": ["code_based", "overview"], "source_reference": "Notes: Multivariate chapter"}, {"id": "C0124", "front": "What is the general trapdoor idea of code-based cryptography?", "back": "The idea is to make public a random-looking code that is hard to decode, while keeping private an equivalent structured code for which decoding is efficient.", "requirement_id": "REQ-04", "topic": "Trapdoor", "difficulty": "easy", "tags": ["code_based", "trapdoor"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0125", "front": "What is the role of the structured code in code-based cryptography?", "back": "The structured code allows the legitimate decryptor to correct the errors efficiently and recover the original message.", "requirement_id": "REQ-04", "topic": "Trapdoor", "difficulty": "easy", "tags": ["code_based", "trapdoor"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0126", "front": "Who proposed the first code-based cryptosystem?", "back": "The first cryptosystem based on coding theory was proposed by Robert McEliece in 1978.", "requirement_id": "REQ-04", "topic": "Mceliece", "difficulty": "easy", "tags": ["code_based", "mceliece", "history"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0127", "front": "What is the McEliece cryptosystem based on?", "back": "The McEliece cryptosystem is based on the hardness of decoding a random linear code.", "requirement_id": "REQ-04", "topic": "Mceliece", "difficulty": "easy", "tags": ["code_based", "mceliece", "definition"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0128", "front": "Which type of codes does the original McEliece cryptosystem use?", "back": "The original McEliece cryptosystem uses binary Goppa codes.", "requirement_id": "REQ-04", "topic": "Goppa", "difficulty": "medium", "tags": ["code_based", "mceliece", "goppa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0129", "front": "Why are Goppa codes used in McEliece?", "back": "Goppa codes are used because they have efficient decoding algorithms, such as Patterson’s algorithm, while a random-looking linear code is hard to decode.", "requirement_id": "REQ-04", "topic": "Goppa", "difficulty": "hard", "tags": ["code_based", "mceliece", "goppa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0130", "front": "What is the main security assumption of McEliece?", "back": "The security of McEliece relies on the difficulty of decoding a random linear code, which is believed to be hard even for quantum computers.", "requirement_id": "REQ-04", "topic": "Security", "difficulty": "hard", "tags": ["code_based", "mceliece", "security"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0131", "front": "What parameters are chosen at the beginning of McEliece key generation?", "back": "One chooses integers m and t and fixes n = 2^m.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "medium", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0132", "front": "What code is selected during McEliece key generation?", "back": "A binary Goppa code C of length n able to correct t errors is selected. Equivalently, this corresponds to selecting an irreducible polynomial of degree t over F_{2^m}.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "medium", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0133", "front": "What is G in McEliece key generation?", "back": "G is the k × n generator matrix of the selected Goppa code C, where k is the dimension of the code.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "easy", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0134", "front": "What is S in McEliece key generation?", "back": "S is a random k × k invertible matrix.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "easy", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0135", "front": "What is P in McEliece key generation?", "back": "P is a random n × n permutation matrix.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "easy", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0136", "front": "How is the McEliece public matrix computed?", "back": "The public matrix is computed as Ĝ = SGP.", "requirement_id": "REQ-04", "topic": "Keygen", "difficulty": "medium", "tags": ["code_based", "mceliece", "keygen"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0137", "front": "What is the public key in McEliece?", "back": "The public key is Ĝ = SGP.", "requirement_id": "REQ-04", "topic": "Public Key", "difficulty": "easy", "tags": ["code_based", "mceliece", "public_key"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0138", "front": "What is the private key in McEliece?", "back": "The private key is the triple (S, G, P).", "requirement_id": "REQ-04", "topic": "Private Key", "difficulty": "easy", "tags": ["code_based", "mceliece", "private_key"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0139", "front": "What is the role of S in McEliece?", "back": "S hides the original generator matrix G by changing the basis of the code.", "requirement_id": "REQ-04", "topic": "Intuition", "difficulty": "easy", "tags": ["code_based", "mceliece", "intuition"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0140", "front": "What is the role of P in McEliece?", "back": "P permutes the coordinates of the codewords, helping to hide the structure of the Goppa code.", "requirement_id": "REQ-04", "topic": "Intuition", "difficulty": "easy", "tags": ["code_based", "mceliece", "intuition"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0141", "front": "What is the plaintext space in McEliece?", "back": "The plaintext is a binary vector m ∈ F_2^k.", "requirement_id": "REQ-04", "topic": "Encryption", "difficulty": "easy", "tags": ["code_based", "mceliece", "encryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0142", "front": "What random value is chosen during McEliece encryption?", "back": "A random error vector e ∈ F_2^n of Hamming weight t is chosen.", "requirement_id": "REQ-04", "topic": "Encryption", "difficulty": "medium", "tags": ["code_based", "mceliece", "encryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0143", "front": "How is encryption performed in McEliece?", "back": "Given plaintext m and public key Ĝ, choose an error vector e of Hamming weight t and compute y = mĜ + e. The vector y is the ciphertext.", "requirement_id": "REQ-04", "topic": "Encryption", "difficulty": "medium", "tags": ["code_based", "mceliece", "encryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0144", "front": "What is the ciphertext in McEliece?", "back": "The ciphertext is y = mĜ + e, where m is the plaintext and e is a random error vector of Hamming weight t.", "requirement_id": "REQ-04", "topic": "Ciphertext", "difficulty": "easy", "tags": ["code_based", "mceliece", "ciphertext"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0145", "front": "Why is the error vector added during McEliece encryption?", "back": "The error vector makes the received word hard to decode for someone who only knows the public random-looking code.", "requirement_id": "REQ-04", "topic": "Encryption", "difficulty": "hard", "tags": ["code_based", "mceliece", "encryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0146", "front": "What is the first step of McEliece decryption?", "back": "Given the ciphertext y, compute y′ = yP^{-1}.", "requirement_id": "REQ-04", "topic": "Decryption", "difficulty": "easy", "tags": ["code_based", "mceliece", "decryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0147", "front": "Why does McEliece decryption multiply by P^{-1}?", "back": "Multiplying by P^{-1} removes the secret permutation introduced in the public key Ĝ = SGP.", "requirement_id": "REQ-04", "topic": "Decryption", "difficulty": "hard", "tags": ["code_based", "mceliece", "decryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0148", "front": "What is obtained after multiplying the ciphertext by P^{-1}?", "back": "Starting from y = mĜ + e, we get yP^{-1} = mSG + eP^{-1}.", "requirement_id": "REQ-04", "topic": "Correctness", "difficulty": "hard", "tags": ["code_based", "mceliece", "correctness"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0149", "front": "Why does eP^{-1} still have Hamming weight t?", "back": "P^{-1} is a permutation matrix, so it only permutes the entries of e and does not change its Hamming weight.", "requirement_id": "REQ-04", "topic": "Correctness", "difficulty": "hard", "tags": ["code_based", "mceliece", "correctness"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0150", "front": "Why can Patterson’s algorithm be applied during McEliece decryption?", "back": "After computing yP^{-1}, we obtain a codeword of the secret Goppa code plus an error of Hamming weight t. Since the Goppa code can correct t errors, Patterson’s algorithm can decode it.", "requirement_id": "REQ-04", "topic": "Decryption", "difficulty": "hard", "tags": ["code_based", "mceliece", "decryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0151", "front": "What does Patterson decoding recover in McEliece decryption?", "back": "It recovers the codeword m′G, where m′ = mS.", "requirement_id": "REQ-04", "topic": "Decryption", "difficulty": "easy", "tags": ["code_based", "mceliece", "decryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0152", "front": "How is the original plaintext recovered in McEliece decryption?", "back": "After decoding, the decryptor recovers m′ = mS and then computes m′S^{-1} = m.", "requirement_id": "REQ-04", "topic": "Decryption", "difficulty": "medium", "tags": ["code_based", "mceliece", "decryption"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0153", "front": "State the proof of correctness of McEliece in one formula.", "back": "Starting from y = mĜ + e and Ĝ = SGP, we compute yP^{-1} = mSGPP^{-1} + eP^{-1} = (mS)G + eP^{-1}. Patterson decoding removes eP^{-1}, recovering mS, and multiplying by S^{-1} gives m.", "requirement_id": "REQ-04", "topic": "Correctness", "difficulty": "hard", "tags": ["code_based", "mceliece", "correctness"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0154", "front": "What is the trapdoor in McEliece?", "back": "The trapdoor is the relation Ĝ = SGP: the public key looks like a random generator matrix, while the private key reveals the structured Goppa code and the transformations used to hide it.", "requirement_id": "REQ-04", "topic": "Trapdoor", "difficulty": "easy", "tags": ["code_based", "mceliece", "trapdoor"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0155", "front": "Why does McEliece hide the Goppa code?", "back": "It hides the Goppa code because decoding a random-looking linear code is hard, while decoding the secret Goppa code is efficient.", "requirement_id": "REQ-04", "topic": "Trapdoor", "difficulty": "hard", "tags": ["code_based", "mceliece", "trapdoor"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0156", "front": "Why is using only Ĝ = SG not secure?", "back": "If Ĝ = SG, then Ĝ and G generate the same linear code. S only changes the basis, so the structure of the Goppa code is not really hidden.", "requirement_id": "REQ-04", "topic": "Trapdoor Improvements", "difficulty": "hard", "tags": ["code_based", "mceliece", "trapdoor_improvements"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0157", "front": "Why is using only Ĝ = GP considered insecure?", "back": "If Ĝ = GP, the public code is equivalent to the secret code, but the structure may still be recoverable for some code families. Therefore, this can be vulnerable to structural attacks.", "requirement_id": "REQ-04", "topic": "Trapdoor Improvements", "difficulty": "hard", "tags": ["code_based", "mceliece", "trapdoor_improvements"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0158", "front": "What are structural attacks in McEliece?", "back": "Structural attacks try to recover the hidden structure of the private code from the public key.", "requirement_id": "REQ-04", "topic": "Security", "difficulty": "hard", "tags": ["code_based", "mceliece", "security"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0159", "front": "What is a ciphertext-only attack in McEliece?", "back": "In a ciphertext-only attack, the attacker knows a ciphertext x = uG′ + z and tries to recover the plaintext u without knowing the private key.", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0160", "front": "In McEliece COA notation, what are u, G′ and z?", "back": "u ∈ F_2^k is the plaintext, G′ is the public generator matrix, and z ∈ F_2^n is an unknown random error vector of Hamming weight t.", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0161", "front": "Why is the naive ciphertext-only attack hard?", "back": "From x = uG′ + z, the attacker has n equations but k + n unknowns, namely the plaintext variables and the error variables. This leaves many possible solutions.", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0162", "front": "What is the naive complexity of recovering the plaintext in McEliece COA?", "back": "Assuming the equations are linearly independent, there are 2^k possible plaintext candidates, so the naive attack has complexity O(2^k).", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0163", "front": "How can the ciphertext-only attack be improved?", "back": "The attacker can try to select k equations among the n equations where all corresponding error coordinates are zero, obtaining a linear system in only the plaintext variables.", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0164", "front": "What is the probability of selecting k error-free equations in McEliece COA?", "back": "The probability is approximately (1 − t/n)^k, because each selected coordinate has probability 1 − t/n of not containing an error.", "requirement_id": "REQ-04", "topic": "Coa", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "coa"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0167", "front": "Why is brute force against the McEliece private key infeasible?", "back": "Because the private key contains an invertible matrix S, a Goppa generator matrix G and a permutation matrix P, and the number of possible choices for these objects is extremely large.", "requirement_id": "REQ-04", "topic": "Bruteforce", "difficulty": "hard", "tags": ["code_based", "mceliece", "security", "bruteforce"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0168", "front": "What is the main performance drawback of McEliece?", "back": "The main drawback is the very large public key size, since the public key is a k × n binary matrix.", "requirement_id": "REQ-04", "topic": "Performance", "difficulty": "easy", "tags": ["code_based", "mceliece", "performance"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0169", "front": "Why is McEliece considered post-quantum?", "back": "It is considered post-quantum because its security relies on decoding random linear codes, a problem for which no efficient quantum attack comparable to Shor’s algorithm is known.", "requirement_id": "REQ-04", "topic": "Post Quantum", "difficulty": "hard", "tags": ["code_based", "mceliece", "post_quantum"], "source_reference": "Notes ch.5 (Code-based cryptosystems)"}, {"id": "C0170", "fr
